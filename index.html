<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fanter World - Prodigy x Pokemon Style</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e1b4b);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', 'Quicksand', system-ui, sans-serif;
      overflow: hidden;
    }

    .game-container {
      position: relative;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      border: 3px solid #fbbf24;
    }

    canvas {
      display: block;
      margin: 0 auto;
      cursor: crosshair;
      border-radius: 16px;
    }

    /* UI Panels - Prodigy Style */
    .ui-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 12px 24px;
      color: white;
      border-left: 4px solid #fbbf24;
      z-index: 10;
      font-size: 14px;
      font-weight: 600;
      pointer-events: none;
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .ui-panel span {
      color: #fbbf24;
    }

    .xp-bar {
      width: 150px;
      height: 8px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      overflow: hidden;
      margin-top: 5px;
    }

    .xp-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #fbbf24, #f59e0b);
      transition: width 0.3s;
    }

    .pet-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 12px 24px;
      color: white;
      border-left: 4px solid #a855f7;
      z-index: 10;
      min-width: 220px;
      pointer-events: none;
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .pet-panel .pet-name {
      color: #a855f7;
      font-weight: bold;
      font-size: 18px;
    }

    .pet-stats {
      display: flex;
      gap: 20px;
      margin-top: 8px;
      font-size: 12px;
    }

    .hp-bar {
      background: #ef4444;
      border-radius: 10px;
      height: 6px;
      width: 100px;
      overflow: hidden;
      margin-top: 4px;
    }

    .hp-fill {
      width: 100%;
      height: 100%;
      background: #22c55e;
      transition: width 0.3s;
    }

    .controls-hint {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 8px 16px;
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      z-index: 10;
      pointer-events: none;
      font-family: 'Poppins', sans-serif;
    }

    /* Pokemon-Style Battle Panel */
    .battle-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
      border-top: 3px solid #fbbf24;
      padding: 20px 40px;
      color: white;
      z-index: 20;
      display: none;
      animation: slideUp 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
    }

    .battle-panel.active {
      display: block;
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
      }
      to {
        transform: translateY(0);
      }
    }

    .battle-top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 0 50px;
    }

    .battle-enemy-card, .battle-player-card {
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
      padding: 10px 20px;
      min-width: 200px;
      text-align: center;
      backdrop-filter: blur(5px);
    }

    .battle-enemy-name {
      font-size: 20px;
      font-weight: bold;
      color: #f87171;
    }

    .battle-player-name {
      font-size: 20px;
      font-weight: bold;
      color: #a855f7;
    }

    .battle-hp-text {
      font-size: 12px;
      margin-top: 5px;
    }

    .battle-arena {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 150px;
      margin: 20px 0;
      min-height: 250px;
    }

    .battle-enemy-sprite, .battle-player-sprite {
      text-align: center;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
    }

    .battle-enemy-sprite canvas, .battle-player-sprite canvas {
      width: 180px;
      height: 180px;
    }

    .battle-actions {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .battle-btn {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border: none;
      border-radius: 60px;
      padding: 12px 28px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Poppins', sans-serif;
      font-size: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .battle-btn:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #2563eb, #1e3a8a);
      box-shadow: 0 0 15px rgba(59,130,246,0.5);
    }

    .battle-btn.special {
      background: linear-gradient(135deg, #a855f7, #7e22ce);
    }

    .battle-message-box {
      background: rgba(0,0,0,0.7);
      border-radius: 20px;
      padding: 12px 24px;
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      color: #fbbf24;
    }

    .run-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    @keyframes damageFlash {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.5) drop-shadow(0 0 10px red); }
    }

    .shake-animation {
      animation: shake 0.3s ease-in-out;
    }

    .damage-animation {
      animation: damageFlash 0.3s ease-in-out;
    }
  </style>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="1400" height="800"></canvas>
  
  <div class="ui-panel">
    🗺️ FANTER WORLD | <span>✨ Lv <span id="playerLevel">1</span></span>
    <div class="xp-bar"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
    <div><span id="xpCount">0</span>/<span id="xpNeeded">100</span> XP</div>
  </div>
  
  <div class="pet-panel">
    🐱 <span class="pet-name" id="petName">Mewt</span> <span id="petLevel">Lv 1</span>
    <div class="pet-stats">
      <div>❤️ <span id="petHp">30</span>/<span id="petMaxHp">30</span></div>
      <div>⚔️ <span id="petAttack">10-14</span></div>
      <div>🛡️ Def <span id="petDefense">5</span></div>
    </div>
    <div class="hp-bar"><div class="hp-fill" id="petHpBar" style="width:100%"></div></div>
  </div>
  
  <div class="controls-hint">
    🎮 WASD or Click to Move | 🐱 Pet Follows | ⚔️ Touch Enemy = Battle
  </div>
  
  <!-- Pokemon-Style Battle Panel -->
  <div class="battle-panel" id="battlePanel">
    <div class="battle-top">
      <div class="battle-enemy-card">
        <div class="battle-enemy-name" id="battleEnemyName">Wild Slime</div>
        <div class="battle-hp-text">❤️ <span id="battleEnemyHp">25</span>/<span id="battleEnemyMaxHp">25</span></div>
        <div class="hp-bar"><div class="hp-fill" id="battleEnemyHpBar" style="width:100%"></div></div>
      </div>
      <div class="battle-player-card">
        <div class="battle-player-name">🐱 Mewt</div>
        <div class="battle-hp-text">❤️ <span id="battlePetHp">30</span>/<span id="battlePetMaxHp">30</span></div>
        <div class="hp-bar"><div class="hp-fill" id="battlePetHpBar" style="width:100%"></div></div>
      </div>
    </div>
    
    <div class="battle-arena">
      <div class="battle-enemy-sprite" id="battleEnemySprite">
        <canvas id="enemySpriteCanvas" width="180" height="180"></canvas>
      </div>
      <div class="battle-player-sprite" id="battlePlayerSprite">
        <canvas id="playerSpriteCanvas" width="180" height="180"></canvas>
      </div>
    </div>
    
    <div class="battle-actions" id="battleActions">
      <button class="battle-btn" id="attackBtn">⚔️ Scratch</button>
      <button class="battle-btn special" id="specialBtn">✨ Spark</button>
      <button class="battle-btn run-btn" id="runBtn">🏃 Run</button>
    </div>
    
    <div class="battle-message-box" id="battleMessage">
      A wild enemy appeared! Choose an action!
    </div>
  </div>
</div>

<script>
  // ============================================================
  // FANTER WORLD - PRODIGY x POKEMON STYLE
  // ============================================================
  
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  
  // Battle sprite canvases
  const enemySpriteCanvas = document.getElementById('enemySpriteCanvas');
  const enemySpriteCtx = enemySpriteCanvas.getContext('2d');
  const playerSpriteCanvas = document.getElementById('playerSpriteCanvas');
  const playerSpriteCtx = playerSpriteCanvas.getContext('2d');
  
  // ============================================================
  // WORLD SETUP
  // ============================================================
  const WORLD_WIDTH = 3000;
  const WORLD_HEIGHT = 3000;
  const VIEW_WIDTH = 1400;
  const VIEW_HEIGHT = 800;
  
  let cameraX = 0;
  let cameraY = 0;
  
  // Beautiful terrain tiles
  const terrainColors = {
    grass: ['#4ade80', '#22c55e', '#16a34a', '#15803d'],
    path: ['#d97706', '#ca8a04', '#b45309'],
    flower: ['#f472b6', '#fbbf24', '#a855f7', '#06b6d4']
  };
  
  // Decorative elements
  const decorations = [];
  for (let i = 0; i < 300; i++) {
    decorations.push({
      x: Math.random() * WORLD_WIDTH,
      y: Math.random() * WORLD_HEIGHT,
      type: Math.random() > 0.7 ? 'flower' : 'grass_tuft',
      color: terrainColors.flower[Math.floor(Math.random() * terrainColors.flower.length)]
    });
  }
  
  // Trees
  const trees = [];
  for (let i = 0; i < 120; i++) {
    trees.push({
      x: 200 + Math.random() * (WORLD_WIDTH - 400),
      y: 200 + Math.random() * (WORLD_HEIGHT - 400),
      size: 28 + Math.random() * 15
    });
  }
  
  // Enemies
  const enemies = [
    { x: 600, y: 500, name: 'Slime', hp: 28, maxHp: 28, attack: 6, defense: 3, exp: 30, color: '#86efac', type: 'slime', level: 2 },
    { x: 1500, y: 800, name: 'Glimmer', hp: 35, maxHp: 35, attack: 8, defense: 4, exp: 45, color: '#fbbf24', type: 'glimmer', level: 3 },
    { x: 2200, y: 1200, name: 'Shadowpaw', hp: 40, maxHp: 40, attack: 10, defense: 5, exp: 60, color: '#a855f7', type: 'shadow', level: 4 },
    { x: 900, y: 2200, name: 'Frostbite', hp: 32, maxHp: 32, attack: 7, defense: 6, exp: 40, color: '#06b6d4', type: 'frost', level: 3 },
    { x: 2500, y: 2000, name: 'Emberfang', hp: 45, maxHp: 45, attack: 12, defense: 4, exp: 75, color: '#f97316', type: 'ember', level: 5 },
    { x: 400, y: 2600, name: 'Leafpuff', hp: 30, maxHp: 30, attack: 5, defense: 7, exp: 35, color: '#4ade80', type: 'leaf', level: 2 },
  ];
  
  // ============================================================
  // PLAYER & PET
  // ============================================================
  const player = {
    x: WORLD_WIDTH / 2,
    y: WORLD_HEIGHT / 2,
    vx: 0,
    vy: 0,
    targetX: WORLD_WIDTH / 2,
    targetY: WORLD_HEIGHT / 2,
    speed: 3.2,
    direction: 'down',
    walkCycle: 0,
    level: 1,
    xp: 0,
    xpNeeded: 100
  };
  
  const pet = {
    x: WORLD_WIDTH / 2 - 45,
    y: WORLD_HEIGHT / 2,
    hp: 35,
    maxHp: 35,
    attack: 12,
    defense: 6,
    level: 1,
    exp: 0,
    specialEnergy: 0
  };
  
  // Battle state
  let inBattle = false;
  let currentEnemy = null;
  let battlePetHp = pet.hp;
  let battleEnemyHp = 0;
  let battleMessage = '';
  let isAnimating = false;
  let attackAnimation = null;
  
  // Movement flags
  const keys = { w: false, s: false, a: false, d: false };
  
  // ============================================================
  // DRAW BEAUTIFUL WORLD (Prodigy Style)
  // ============================================================
  
  function drawGround() {
    const startX = Math.max(0, Math.floor(cameraX / 30));
    const endX = Math.min(100, Math.ceil((cameraX + VIEW_WIDTH) / 30));
    const startY = Math.max(0, Math.floor(cameraY / 30));
    const endY = Math.min(100, Math.ceil((cameraY + VIEW_HEIGHT) / 30));
    
    for (let i = startX; i < endX; i++) {
      for (let j = startY; j < endY; j++) {
        const x = i * 30 - cameraX;
        const y = j * 30 - cameraY;
        
        // Create a nice gradient grass
        const grassIndex = (i + j) % terrainColors.grass.length;
        ctx.fillStyle = terrainColors.grass[grassIndex];
        ctx.fillRect(x, y, 32, 32);
        
        // Add subtle noise/detail
        ctx.fillStyle = 'rgba(0,0,0,0.03)';
        for (let k = 0; k < 3; k++) {
          ctx.fillRect(x + Math.random() * 28, y + Math.random() * 28, 2, 2);
        }
      }
    }
  }
  
  function drawDecorations() {
    for (const dec of decorations) {
      const x = dec.x - cameraX;
      const y = dec.y - cameraY;
      if (x + 15 < 0 || x - 15 > VIEW_WIDTH || y + 15 < 0 || y - 15 > VIEW_HEIGHT) continue;
      
      if (dec.type === 'flower') {
        ctx.fillStyle = dec.color;
        ctx.beginPath();
        ctx.ellipse(x, y, 4, 4, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fbbf24';
        ctx.beginPath();
        ctx.ellipse(x, y, 2, 2, 0, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = '#22c55e';
        ctx.beginPath();
        ctx.moveTo(x, y - 4);
        ctx.lineTo(x - 3, y);
        ctx.lineTo(x + 3, y);
        ctx.fill();
      }
    }
  }
  
  function drawTrees() {
    for (const tree of trees) {
      const x = tree.x - cameraX;
      const y = tree.y - cameraY;
      if (x + 40 < 0 || x - 40 > VIEW_WIDTH || y + 50 < 0 || y - 50 > VIEW_HEIGHT) continue;
      
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath();
      ctx.ellipse(x + 5, y + 25, 18, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Trunk
      ctx.fillStyle = '#8B5A2B';
      ctx.fillRect(x - 6, y + 5, 12, 25);
      
      // Leaves (layered circles)
      ctx.fillStyle = '#2d6e2d';
      ctx.beginPath();
      ctx.ellipse(x, y - 2, 18, 20, 0, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#3a8c3a';
      ctx.beginPath();
      ctx.ellipse(x - 7, y - 10, 14, 16, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(x + 7, y - 10, 14, 16, 0, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#4ade80';
      ctx.beginPath();
      ctx.ellipse(x, y - 18, 10, 12, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  
  // ============================================================
  // DRAW PRODIGY-STYLE CHARACTERS
  // ============================================================
  
  function drawPlayer() {
    const x = player.x - cameraX;
    const y = player.y - cameraY;
    const bob = Math.sin(Date.now() / 200) * 1.5;
    const walk = Math.sin(player.walkCycle * Math.PI) * 2.5;
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(x + 3, y + 38, 18, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Cape (Prodigy signature)
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath();
    ctx.moveTo(x - 14, y + 8 + bob + walk);
    ctx.quadraticCurveTo(x - 5, y + 25 + bob + walk, x, y + 28 + bob + walk);
    ctx.quadraticCurveTo(x + 5, y + 25 + bob + walk, x + 14, y + 8 + bob + walk);
    ctx.fill();
    
    // Body
    ctx.fillStyle = '#3b82f6';
    ctx.beginPath();
    ctx.roundRect(x - 14, y - 8 + bob + walk, 28, 34, 12);
    ctx.fill();
    
    // Legs
    ctx.fillStyle = '#2563eb';
    ctx.fillRect(x - 10, y + 22 + bob + walk, 8, 14);
    ctx.fillRect(x + 2, y + 22 + bob + walk, 8, 14);
    
    // Boots
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(x - 11, y + 32 + bob + walk, 10, 6);
    ctx.fillRect(x + 1, y + 32 + bob + walk, 10, 6);
    
    // Head
    ctx.fillStyle = '#fcd34d';
    ctx.beginPath();
    ctx.ellipse(x, y - 12 + bob + walk, 16, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Hair
    ctx.fillStyle = '#d97706';
    ctx.beginPath();
    ctx.ellipse(x, y - 24 + bob + walk, 14, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Eyes (big anime style)
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(x - 6, y - 16 + bob + walk, 5, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 6, y - 16 + bob + walk, 5, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.ellipse(x - 6, y - 15 + bob + walk, 3, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 6, y - 15 + bob + walk, 3, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Eye sparkle
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(x - 8, y - 18 + bob + walk, 1.5, 1.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 4, y - 18 + bob + walk, 1.5, 1.5, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Mouth (happy)
    ctx.fillStyle = '#b45309';
    ctx.beginPath();
    ctx.ellipse(x, y - 6 + bob + walk, 5, 3, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  
  function drawPet() {
    const x = pet.x - cameraX;
    const y = pet.y - cameraY;
    const bob = Math.sin(Date.now() / 180) * 1.5;
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(x + 2, y + 32, 15, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Tail
    ctx.fillStyle = '#22c55e';
    ctx.beginPath();
    ctx.moveTo(x + 16, y + 12 + bob);
    ctx.quadraticCurveTo(x + 30, y + 5 + bob, x + 26, y - 8 + bob);
    ctx.lineTo(x + 22, y - 3 + bob);
    ctx.fill();
    
    // Body
    ctx.fillStyle = '#22c55e';
    ctx.beginPath();
    ctx.roundRect(x - 12, y - 2 + bob, 24, 28, 12);
    ctx.fill();
    
    // Belly
    ctx.fillStyle = '#86efac';
    ctx.beginPath();
    ctx.roundRect(x - 8, y + 4 + bob, 16, 18, 8);
    ctx.fill();
    
    // Head
    ctx.fillStyle = '#22c55e';
    ctx.beginPath();
    ctx.ellipse(x, y - 8 + bob, 14, 15, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Ears
    ctx.fillStyle = '#16a34a';
    ctx.beginPath();
    ctx.moveTo(x - 12, y - 18 + bob);
    ctx.lineTo(x - 18, y - 30 + bob);
    ctx.lineTo(x - 6, y - 20 + bob);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + 12, y - 18 + bob);
    ctx.lineTo(x + 18, y - 30 + bob);
    ctx.lineTo(x + 6, y - 20 + bob);
    ctx.fill();
    
    // Inner ears
    ctx.fillStyle = '#fcd34d';
    ctx.beginPath();
    ctx.moveTo(x - 11, y - 19 + bob);
    ctx.lineTo(x - 15, y - 27 + bob);
    ctx.lineTo(x - 7, y - 20 + bob);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + 11, y - 19 + bob);
    ctx.lineTo(x + 15, y - 27 + bob);
    ctx.lineTo(x + 7, y - 20 + bob);
    ctx.fill();
    
    // Eyes (big cute)
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(x - 5, y - 12 + bob, 5, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 5, y - 12 + bob, 5, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.ellipse(x - 5, y - 11 + bob, 2.5, 3.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 5, y - 11 + bob, 2.5, 3.5, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Eye sparkle
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(x - 7, y - 14 + bob, 1.5, 1.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 3, y - 14 + bob, 1.5, 1.5, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Nose
    ctx.fillStyle = '#ef4444';
    ctx.beginPath();
    ctx.ellipse(x, y - 5 + bob, 2, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Whiskers
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x - 12, y - 8 + bob);
    ctx.lineTo(x - 22, y - 10 + bob);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x - 12, y - 5 + bob);
    ctx.lineTo(x - 22, y - 6 + bob);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 12, y - 8 + bob);
    ctx.lineTo(x + 22, y - 10 + bob);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 12, y - 5 + bob);
    ctx.lineTo(x + 22, y - 6 + bob);
    ctx.stroke();
  }
  
  function drawEnemySprite(ctx, enemy, x, y, size = 140) {
    const bob = Math.sin(Date.now() / 300) * 3;
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(x + 65, y + 130, 40, 15, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Body
    ctx.fillStyle = enemy.color;
    ctx.beginPath();
    ctx.ellipse(x + 65, y + 80 + bob, 50, 55, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(x + 45, y + 70 + bob, 12, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 85, y + 70 + bob, 12, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.ellipse(x + 45, y + 72 + bob, 6, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 85, y + 72 + bob, 6, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Eye shine
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(x + 41, y + 67 + bob, 3, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 81, y + 67 + bob, 3, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Mouth
    ctx.fillStyle = '#b45309';
    ctx.beginPath();
    ctx.ellipse(x + 65, y + 100 + bob, 12, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Cute blush
    ctx.fillStyle = 'rgba(255,100,100,0.4)';
    ctx.beginPath();
    ctx.ellipse(x + 32, y + 85 + bob, 8, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 98, y + 85 + bob, 8, 5, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  
  function drawPlayerSprite(ctx, x, y) {
    const bob = Math.sin(Date.now() / 250) * 2;
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(x + 65, y + 130, 40, 15, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Body
    ctx.fillStyle = '#3b82f6';
    ctx.beginPath();
    ctx.roundRect(x + 40, y + 50 + bob, 50, 60, 15);
    ctx.fill();
    
    // Head
    ctx.fillStyle = '#fcd34d';
    ctx.beginPath();
    ctx.ellipse(x + 65, y + 40 + bob, 30, 32, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Ears (cat ears for pet)
    ctx.fillStyle = '#22c55e';
    ctx.beginPath();
    ctx.moveTo(x + 45, y + 20 + bob);
    ctx.lineTo(x + 35, y + 5 + bob);
    ctx.lineTo(x + 55, y + 18 + bob);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + 85, y + 20 + bob);
    ctx.lineTo(x + 95, y + 5 + bob);
    ctx.lineTo(x + 75, y + 18 + bob);
    ctx.fill();
    
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(x + 50, y + 38 + bob, 8, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 80, y + 38 + bob, 8, 10, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath();
    ctx.ellipse(x + 50, y + 40 + bob, 4, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 80, y + 40 + bob, 4, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Eye sparkle
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(x + 47, y + 36 + bob, 2, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 77, y + 36 + bob, 2, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Nose
    ctx.fillStyle = '#ef4444';
    ctx.beginPath();
    ctx.ellipse(x + 65, y + 52 + bob, 3, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Whiskers
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + 38, y + 50 + bob);
    ctx.lineTo(x + 25, y + 48 + bob);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 38, y + 54 + bob);
    ctx.lineTo(x + 25, y + 56 + bob);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 92, y + 50 + bob);
    ctx.lineTo(x + 105, y + 48 + bob);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 92, y + 54 + bob);
    ctx.lineTo(x + 105, y + 56 + bob);
    ctx.stroke();
  }
  
  // ============================================================
  // MOVEMENT & COLLISION
  // ============================================================
  
  function isColliding(x, y, radius) {
    for (const tree of trees) {
      const dx = x - tree.x;
      const dy = y - tree.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < radius + tree.size / 1.5) return true;
    }
    
    for (const enemy of enemies) {
      const dx = x - enemy.x;
      const dy = y - enemy.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < radius + 30 && !inBattle) {
        startBattle(enemy);
        return true;
      }
    }
    
    if (x - radius < 0) return true;
    if (x + radius > WORLD_WIDTH) return true;
    if (y - radius < 0) return true;
    if (y + radius > WORLD_HEIGHT) return true;
    
    return false;
  }
  
  function updateMovement() {
    if (inBattle) return;
    
    let moveX = 0, moveY = 0;
    if (keys.w) moveY -= 1;
    if (keys.s) moveY += 1;
    if (keys.a) moveX -= 1;
    if (keys.d) moveX += 1;
    
    if (moveX !== 0 || moveY !== 0) {
      const len = Math.hypot(moveX, moveY);
      moveX /= len;
      moveY /= len;
      
      let newX = player.x + moveX * player.speed;
      let newY = player.y + moveY * player.speed;
      
      if (!isColliding(newX, player.y, 18)) player.x = newX;
      if (!isColliding(player.x, newY, 18)) player.y = newY;
      
      if (Math.abs(moveX) > Math.abs(moveY)) {
        player.direction = moveX > 0 ? 'right' : 'left';
      } else {
        player.direction = moveY > 0 ? 'down' : 'up';
      }
      
      player.walkCycle += 0.15;
    } else {
      player.walkCycle = 0;
    }
    
    // Pet follow
    const angle = Math.atan2(player.y - pet.y, player.x - pet.x);
    pet.x += Math.cos(angle) * 2.5;
    pet.y += Math.sin(angle) * 2.5;
    
    // Camera follow
    cameraX = player.x - VIEW_WIDTH / 2;
    cameraY = player.y - VIEW_HEIGHT / 2;
    cameraX = Math.max(0, Math.min(cameraX, WORLD_WIDTH - VIEW_WIDTH));
    cameraY = Math.max(0, Math.min(cameraY, WORLD_HEIGHT - VIEW_HEIGHT));
  }
  
  // ============================================================
  // BATTLE SYSTEM (Pokemon Style)
  // ============================================================
  
  function startBattle(enemy) {
    if (inBattle) return;
    inBattle = true;
    currentEnemy = { ...enemy };
    battleEnemyHp = currentEnemy.hp;
    battlePetHp = pet.hp;
    battleMessage = `Wild ${currentEnemy.name} appeared! What will Mewt do?`;
    
    // Update battle UI
    document.getElementById('battleEnemyName').textContent = currentEnemy.name;
    document.getElementById('battleEnemyHp').textContent = battleEnemyHp;
    document.getElementById('battleEnemyMaxHp').textContent = currentEnemy.maxHp;
    document.getElementById('battlePetHp').textContent = battlePetHp;
    document.getElementById('battlePetMaxHp').textContent = pet.maxHp;
    document.getElementById('battleMessage').textContent = battleMessage;
    
    updateBattleHpBars();
    drawEnemySprite(enemySpriteCtx, currentEnemy, 0, 0);
    drawPlayerSprite(playerSpriteCtx, 0, 0);
    
    document.getElementById('battlePanel').classList.add('active');
  }
  
  function updateBattleHpBars() {
    const enemyPercent = (battleEnemyHp / currentEnemy.maxHp) * 100;
    const petPercent = (battlePetHp / pet.maxHp) * 100;
    document.getElementById('battleEnemyHpBar').style.width = `${Math.max(0, enemyPercent)}%`;
    document.getElementById('battlePetHpBar').style.width = `${Math.max(0, petPercent)}%`;
    document.getElementById('battleEnemyHp').textContent = Math.max(0, battleEnemyHp);
    document.getElementById('battlePetHp').textContent = Math.max(0, battlePetHp);
  }
  
  async function playerAttack(isSpecial = false) {
    if (isAnimating || !inBattle) return;
    isAnimating = true;
    
    const damage = isSpecial ? 
      Math.floor(Math.random() * 15) + 15 : 
      Math.floor(Math.random() * 10) + 8;
    
    const moveName = isSpecial ? 'Spark' : 'Scratch';
    battleMessage = `Mewt used ${moveName}! It dealt ${damage} damage!`;
    document.getElementById('battleMessage').textContent = battleMessage;
    
    // Attack animation
    const enemySprite = document.getElementById('battleEnemySprite');
    enemySprite.classList.add('shake-animation');
    enemySprite.classList.add('damage-animation');
    setTimeout(() => {
      enemySprite.classList.remove('shake-animation', 'damage-animation');
    }, 300);
    
    battleEnemyHp -= damage;
    updateBattleHpBars();
    
    if (battleEnemyHp <= 0) {
      winBattle();
      isAnimating = false;
      return;
    }
    
    // Enemy turn
    setTimeout(() => {
      enemyTurn();
    }, 800);
  }
  
  function enemyTurn() {
    if (!inBattle) return;
    
    const damage = Math.floor(Math.random() * currentEnemy.attack) + 4;
    const reducedDamage = Math.max(1, damage - Math.floor(pet.defense / 3));
    battleMessage = `${currentEnemy.name} attacked! It dealt ${reducedDamage} damage!`;
    document.getElementById('battleMessage').textContent = battleMessage;
    
    // Damage animation
    const playerSprite = document.getElementById('battlePlayerSprite');
    playerSprite.classList.add('shake-animation');
    playerSprite.classList.add('damage-animation');
    setTimeout(() => {
      playerSprite.classList.remove('shake-animation', 'damage-animation');
    }, 300);
    
    battlePetHp -= reducedDamage;
    updateBattleHpBars();
    
    if (battlePetHp <= 0) {
      loseBattle();
    } else {
      battleMessage = `What will Mewt do?`;
      document.getElementById('battleMessage').textContent = battleMessage;
    }
    
    isAnimating = false;
  }
  
  function winBattle() {
    const expGain = currentEnemy.exp;
    pet.exp += expGain;
    battleMessage = `Victory! Mewt gained ${expGain} XP!`;
    document.getElementById('battleMessage').textContent = battleMessage;
    
    player.xp += expGain;
    updatePlayerXP();
    
    // Remove defeated enemy
    const index = enemies.findIndex(e => e.x === currentEnemy.x && e.y === currentEnemy.y);
    if (index !== -1) enemies.splice(index, 1);
    
    // Heal pet
    battlePetHp = Math.min(battlePetHp + Math.floor(pet.maxHp * 0.3), pet.maxHp);
    pet.hp = battlePetHp;
    updatePetUI();
    updateBattleHpBars();
    
    setTimeout(() => {
      document.getElementById('battlePanel').classList.remove('active');
      inBattle = false;
      currentEnemy = null;
      isAnimating = false;
    }, 2500);
  }
  
  function loseBattle() {
    battleMessage = `Mewt fainted... Running away to heal!`;
    document.getElementById('battleMessage').textContent = battleMessage;
    
    pet.hp = pet.maxHp;
    battlePetHp = pet.hp;
    updatePetUI();
    updateBattleHpBars();
    
    setTimeout(() => {
      document.getElementById('battlePanel').classList.remove('active');
      inBattle = false;
      currentEnemy = null;
      isAnimating = false;
    }, 2000);
  }
  
  function runFromBattle() {
    battleMessage = `Got away safely!`;
    document.getElementById('battleMessage').textContent = battleMessage;
    setTimeout(() => {
      document.getElementById('battlePanel').classList.remove('active');
      inBattle = false;
      currentEnemy = null;
      isAnimating = false;
    }, 1000);
  }
  
  function updatePlayerXP() {
    const xpNeeded = player.xpNeeded;
    const xpPercent = (player.xp / xpNeeded) * 100;
    document.getElementById('xpFill').style.width = `${Math.min(100, xpPercent)}%`;
    document.getElementById('xpCount').textContent = player.xp;
    
    if (player.xp >= xpNeeded) {
      player.level++;
      player.xp -= xpNeeded;
      player.xpNeeded = Math.floor(player.xpNeeded * 1.4);
      pet.level++;
      pet.maxHp += 8;
      pet.hp = pet.maxHp;
      pet.attack += 3;
      pet.defense += 2;
      battlePetHp = pet.hp;
      document.getElementById('playerLevel').textContent = player.level;
      document.getElementById('petLevel').textContent = `Lv ${pet.level}`;
      document.getElementById('petAttack').textContent = `${pet.attack}-${pet.attack + 4}`;
      document.getElementById('petDefense').textContent = pet.defense;
      updatePetUI();
      toastMessage(`🎉 Mewt grew to Level ${pet.level}! 🎉`);
    }
  }
  
  function updatePetUI() {
    document.getElementById('petHp').textContent = Math.floor(pet.hp);
    document.getElementById('petMaxHp').textContent = pet.maxHp;
    const hpPercent = (pet.hp / pet.maxHp) * 100;
    document.getElementById('petHpBar').style.width = `${hpPercent}%`;
  }
  
  function toastMessage(msg) {
    const msgBox = document.getElementById('battleMessage');
    if (msgBox) {
      const original = msgBox.textContent;
      msgBox.textContent = msg;
      setTimeout(() => {
        if (document.getElementById('battleMessage')) {
          document.getElementById('battleMessage').textContent = original;
        }
      }, 2000);
    }
  }
  
  // ============================================================
  // EVENT HANDLERS
  // ============================================================
  
  canvas.addEventListener('click', (e) => {
    if (inBattle) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mouseX = (e.clientX - rect.left) * scaleX;
    const mouseY = (e.clientY - rect.top) * scaleY;
    
    player.targetX = cameraX + mouseX;
    player.targetY = cameraY + mouseY;
  });
  
  function updateClickMovement() {
    if (inBattle) return;
    const dx = player.targetX - player.x;
    const dy = player.targetY - player.y;
    const dist = Math.hypot(dx, dy);
    
    if (dist > 3) {
      const moveX = (dx / dist) * player.speed;
      const moveY = (dy / dist) * player.speed;
      
      let newX = player.x + moveX;
      let newY = player.y + moveY;
      
      if (!isColliding(newX, player.y, 18)) player.x = newX;
      if (!isColliding(player.x, newY, 18)) player.y = newY;
      
      if (Math.abs(moveX) > Math.abs(moveY)) {
        player.direction = moveX > 0 ? 'right' : 'left';
      } else if (Math.abs(moveY) > 0) {
        player.direction = moveY > 0 ? 'down' : 'up';
      }
      
      player.walkCycle += 0.15;
    } else {
      player.walkCycle = 0;
    }
  }
  
  document.addEventListener('keydown', (e) => {
    if (inBattle) return;
    const key = e.key.toLowerCase();
    if (key === 'w') keys.w = true;
    if (key === 's') keys.s = true;
    if (key === 'a') keys.a = true;
    if (key === 'd') keys.d = true;
    
    if (['w', 's', 'a', 'd'].includes(key)) {
      player.targetX = player.x;
      player.targetY = player.y;
    }
  });
  
  document.addEventListener('keyup', (e) => {
    const key = e.key.toLowerCase();
    if (key === 'w') keys.w = false;
    if (key === 's') keys.s = false;
    if (key === 'a') keys.a = false;
    if (key === 'd') keys.d = false;
  });
  
  document.getElementById('attackBtn').onclick = () => playerAttack(false);
  document.getElementById('specialBtn').onclick = () => playerAttack(true);
  document.getElementById('runBtn').onclick = () => runFromBattle();
  
  // ============================================================
  // ANIMATION LOOP
  // ============================================================
  
  function animate() {
    if (!inBattle) {
      updateMovement();
      updateClickMovement();
    }
    
    ctx.clearRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);
    
    // Sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, VIEW_HEIGHT);
    grad.addColorStop(0, '#7dd3fc');
    grad.addColorStop(1, '#bae6fd');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);
    
    drawGround();
    drawDecorations();
    drawTrees();
    
    for (const enemy of enemies) {
      const x = enemy.x - cameraX;
      const y = enemy.y - cameraY;
      if (x + 50 < 0 || x - 50 > VIEW_WIDTH || y + 60 < 0 || y - 60 > VIEW_HEIGHT) continue;
      
      // Simple enemy drawing on map
      ctx.fillStyle = enemy.color;
      ctx.beginPath();
      ctx.ellipse(x, y + 10, 20, 22, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1a1a2e';
      ctx.beginPath();
      ctx.ellipse(x - 8, y + 6, 4, 5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(x + 8, y + 6, 4, 5, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    
    drawPet();
    drawPlayer();
    
    // Update battle sprite animations
    if (inBattle && currentEnemy) {
      drawEnemySprite(enemySpriteCtx, currentEnemy, 0, 0);
      drawPlayerSprite(playerSpriteCtx, 0, 0);
    }
    
    requestAnimationFrame(animate);
  }
  
  // Initialize UI
  document.getElementById('petAttack').textContent = `${pet.attack}-${pet.attack + 4}`;
  document.getElementById('petDefense').textContent = pet.defense;
  document.getElementById('petMaxHp').textContent = pet.maxHp;
  document.getElementById('xpNeeded').textContent = player.xpNeeded;
  
  animate();
</script>
