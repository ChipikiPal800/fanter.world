<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fanter World - Retro Pokemon x Prodigy</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #0a0f1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', 'Press Start 2P', 'Quicksand', monospace;
      overflow: hidden;
    }

    .game-container {
      position: relative;
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      border: 3px solid #fbbf24;
      background: #1a4a2a;
    }

    canvas {
      display: block;
      margin: 0 auto;
      cursor: crosshair;
      background: #2d5a3a;
    }

    /* Retro Prodigy-Style Top Bar */
    .top-bar {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 20;
      pointer-events: none;
    }

    .player-card {
      background: rgba(0,0,0,0.8);
      border-radius: 30px;
      padding: 6px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 2px solid #fbbf24;
      pointer-events: auto;
      font-family: monospace;
    }

    .player-avatar {
      width: 36px;
      height: 36px;
      background: #3b82f6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border: 2px solid #fbbf24;
    }

    .player-info h4 {
      color: #fbbf24;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .xp-bar-bg {
      width: 100px;
      height: 6px;
      background: #333;
      border-radius: 3px;
      overflow: hidden;
    }

    .xp-bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #fbbf24, #f59e0b);
      transition: width 0.3s;
    }

    .coin-display {
      background: rgba(0,0,0,0.8);
      border-radius: 30px;
      padding: 6px 16px;
      border: 2px solid #fbbf24;
      color: #fbbf24;
      font-weight: bold;
      font-family: monospace;
    }

    /* Bottom Bar */
    .bottom-bar {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      border-radius: 40px;
      padding: 6px 20px;
      display: flex;
      gap: 12px;
      z-index: 20;
      border: 2px solid #fbbf24;
      pointer-events: auto;
    }

    .bottom-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 30px;
      padding: 8px 16px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      font-family: monospace;
      font-size: 11px;
    }

    .bottom-btn:hover {
      background: #3b82f6;
      transform: translateY(-2px);
    }

    /* Pokemon-Style Battle Screen */
    .battle-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a3a2a, #0d2a1a);
      z-index: 100;
      display: none;
      flex-direction: column;
      font-family: monospace;
    }

    .battle-screen.active {
      display: flex;
    }

    .battle-hud {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
    }

    .battle-hud-card {
      background: rgba(0,0,0,0.7);
      border-radius: 16px;
      padding: 10px 20px;
      min-width: 200px;
      border: 2px solid;
    }

    .battle-hud-card.enemy { border-color: #ef4444; }
    .battle-hud-card.player { border-color: #22c55e; }

    .battle-hud-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .enemy .battle-hud-name { color: #f87171; }
    .player .battle-hud-name { color: #4ade80; }

    .battle-hp-bg {
      width: 160px;
      height: 10px;
      background: #333;
      border-radius: 5px;
      overflow: hidden;
      margin: 5px 0;
    }
    .battle-hp-fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      width: 100%;
      transition: width 0.3s;
    }

    .battle-sprites-area {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 100px;
    }

    .battle-sprite-box {
      text-align: center;
    }

    .battle-sprite-canvas {
      width: 160px;
      height: 160px;
      background: rgba(0,0,0,0.3);
      border-radius: 20px;
    }

    .battle-sprite-name {
      margin-top: 10px;
      color: white;
      font-weight: bold;
    }

    .battle-controls {
      background: #1a1a2e;
      border-top: 3px solid #fbbf24;
      padding: 20px;
    }

    .math-question {
      background: #0f0f1a;
      border-radius: 20px;
      padding: 15px;
      text-align: center;
      margin-bottom: 15px;
    }

    .question-text {
      font-size: 28px;
      color: #fbbf24;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .answer-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .answer-btn {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border: none;
      border-radius: 40px;
      padding: 10px 25px;
      color: white;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      font-family: monospace;
      transition: all 0.2s;
    }

    .answer-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #3b82f6;
    }

    .battle-message {
      background: rgba(0,0,0,0.7);
      border-radius: 15px;
      padding: 10px;
      text-align: center;
      margin-top: 10px;
      color: #fbbf24;
      font-size: 12px;
    }

    .run-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      margin-top: 10px;
      width: 100%;
      padding: 8px;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
    @keyframes flash {
      0%,100% { filter: brightness(1); }
      50% { filter: brightness(1.5) drop-shadow(0 0 10px red); }
    }
    .shake-animation { animation: shake 0.3s ease-in-out; }
    .flash-animation { animation: flash 0.3s ease-in-out; }
  </style>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="1200" height="700"></canvas>

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="player-card">
      <div class="player-avatar">⚔️</div>
      <div class="player-info">
        <h4>FANTER <span id="playerLevelBadge">Lv1</span></h4>
        <div class="xp-bar-bg"><div class="xp-bar-fill" id="xpFill" style="width:0%"></div></div>
        <span style="font-size:9px;"><span id="xpCurrent">0</span>/<span id="xpNeeded">100</span> XP</span>
      </div>
    </div>
    <div class="coin-display">🪙 <span id="coinAmount">100</span></div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <button class="bottom-btn" id="teamBtn">🐱 TEAM</button>
    <button class="bottom-btn" id="bagBtn">🎒 BAG</button>
    <button class="bottom-btn" id="mewtBtn">⭐ MEWT</button>
    <button class="bottom-btn" id="settingsBtn">⚙️ SET</button>
  </div>

  <!-- Battle Screen -->
  <div class="battle-screen" id="battleScreen">
    <div class="battle-hud">
      <div class="battle-hud-card enemy">
        <div class="battle-hud-name" id="battleEnemyName">SLIME</div>
        <div class="battle-hp-bg"><div class="battle-hp-fill" id="battleEnemyHpFill" style="width:100%"></div></div>
        <div style="font-size:11px;">❤️ <span id="battleEnemyHp">0</span>/<span id="battleEnemyMaxHp">0</span></div>
      </div>
      <div class="battle-hud-card player">
        <div class="battle-hud-name">🐱 MEWT</div>
        <div class="battle-hp-bg"><div class="battle-hp-fill" id="battlePetHpFill" style="width:100%"></div></div>
        <div style="font-size:11px;">❤️ <span id="battlePetHp">0</span>/<span id="battlePetMaxHp">0</span></div>
      </div>
    </div>

    <div class="battle-sprites-area">
      <div class="battle-sprite-box">
        <canvas id="battleEnemyCanvas" class="battle-sprite-canvas" width="160" height="160"></canvas>
        <div class="battle-sprite-name" id="battleEnemySpriteName">???</div>
      </div>
      <div class="battle-sprite-box">
        <canvas id="battlePetCanvas" class="battle-sprite-canvas" width="160" height="160"></canvas>
        <div class="battle-sprite-name">MEWT Lv <span id="battlePetLevel">1</span></div>
      </div>
    </div>

    <div class="battle-controls">
      <div class="math-question">
        <div class="question-text" id="questionText">2 + 2 = ?</div>
        <div class="answer-buttons" id="answerButtons"></div>
      </div>
      <div class="battle-message" id="battleMessage">A wild enemy appeared!</div>
      <button class="answer-btn run-btn" id="runBattleBtn">🏃 RUN</button>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // FANTER WORLD - RETRO POKEMON x PRODIGY STYLE
  // ============================================================
  
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  
  // Battle canvases
  const battleEnemyCanvas = document.getElementById('battleEnemyCanvas');
  const battleEnemyCtx = battleEnemyCanvas.getContext('2d');
  const battlePetCanvas = document.getElementById('battlePetCanvas');
  const battlePetCtx = battlePetCanvas.getContext('2d');
  
  // ============================================================
  // WORLD SETUP
  // ============================================================
  const WORLD_WIDTH = 3000;
  const WORLD_HEIGHT = 3000;
  const VIEW_WIDTH = 1200;
  const VIEW_HEIGHT = 700;
  
  let cameraX = WORLD_WIDTH / 2 - VIEW_WIDTH / 2;
  let cameraY = WORLD_HEIGHT / 2 - VIEW_HEIGHT / 2;
  
  // Simple tile-based world (retro style)
  const TILE_SIZE = 32;
  const MAP_WIDTH = 94;
  const MAP_HEIGHT = 94;
  
  // Generate map with different zones
  const groundMap = [];
  for (let i = 0; i < MAP_WIDTH; i++) {
    groundMap[i] = [];
    for (let j = 0; j < MAP_HEIGHT; j++) {
      let zone = 0;
      // Center is grass, edges are darker
      const distFromCenter = Math.abs(i - MAP_WIDTH/2) + Math.abs(j - MAP_HEIGHT/2);
      if (distFromCenter < 20) zone = 2;
      else if (distFromCenter < 40) zone = 1;
      else zone = 0;
      groundMap[i][j] = zone;
    }
  }
  
  const groundColors = ['#3a6b33', '#4a7c3f', '#5a9e4b'];
  
  // Trees
  const trees = [];
  for (let i = 0; i < 120; i++) {
    trees.push({
      x: 200 + Math.random() * (WORLD_WIDTH - 400),
      y: 200 + Math.random() * (WORLD_HEIGHT - 400),
      size: 24
    });
  }
  
  // Flowers
  const flowers = [];
  for (let i = 0; i < 300; i++) {
    flowers.push({
      x: Math.random() * WORLD_WIDTH,
      y: Math.random() * WORLD_HEIGHT,
      color: ['#f472b6', '#fbbf24', '#a855f7'][Math.floor(Math.random() * 3)]
    });
  }
  
  // Enemies
  const enemies = [
    { x: 800, y: 600, name: 'SLIME', hp: 28, maxHp: 28, attack: 7, defense: 3, exp: 30, color: '#86efac', level: 2 },
    { x: 1800, y: 1000, name: 'GLIMMER', hp: 35, maxHp: 35, attack: 9, defense: 4, exp: 45, color: '#fbbf24', level: 3 },
    { x: 2500, y: 1500, name: 'SHADOWPAW', hp: 42, maxHp: 42, attack: 11, defense: 5, exp: 60, color: '#a855f7', level: 4 },
    { x: 1200, y: 2400, name: 'FROSTBITE', hp: 32, maxHp: 32, attack: 8, defense: 6, exp: 40, color: '#06b6d4', level: 3 },
    { x: 2700, y: 2200, name: 'EMBERFANG', hp: 48, maxHp: 48, attack: 13, defense: 4, exp: 75, color: '#f97316', level: 5 },
    { x: 400, y: 2700, name: 'LEAFPUFF', hp: 30, maxHp: 30, attack: 6, defense: 7, exp: 35, color: '#4ade80', level: 2 },
    { x: 2200, y: 500, name: 'THUNDERPAW', hp: 38, maxHp: 38, attack: 10, defense: 4, exp: 55, color: '#facc15', level: 4 },
  ];
  
  // ============================================================
  // PLAYER & PET
  // ============================================================
  const player = {
    x: WORLD_WIDTH / 2,
    y: WORLD_HEIGHT / 2,
    targetX: WORLD_WIDTH / 2,
    targetY: WORLD_HEIGHT / 2,
    speed: 3.2,
    walkFrame: 0,
    level: 1,
    xp: 0,
    xpNeeded: 100,
    coins: 150
  };
  
  const pet = {
    x: WORLD_WIDTH / 2 - 40,
    y: WORLD_HEIGHT / 2,
    hp: 38,
    maxHp: 38,
    attack: 12,
    defense: 7,
    level: 1
  };
  
  // Battle state
  let inBattle = false;
  let currentEnemy = null;
  let battlePetHp = pet.hp;
  let battleEnemyHp = 0;
  let currentQuestion = null;
  let isAnimating = false;
  
  // Movement
  const keys = { w: false, s: false, a: false, d: false };
  
  // Math questions
  const mathQuestions = [
    { q: "1 + 1 = ?", a: 2, opts: [0, 1, 2, 3] },
    { q: "2 + 2 = ?", a: 4, opts: [2, 3, 4, 5] },
    { q: "3 + 1 = ?", a: 4, opts: [2, 3, 4, 5] },
    { q: "5 - 2 = ?", a: 3, opts: [1, 2, 3, 4] },
    { q: "2 + 3 = ?", a: 5, opts: [3, 4, 5, 6] },
    { q: "4 - 1 = ?", a: 3, opts: [1, 2, 3, 4] },
    { q: "1 + 0 = ?", a: 1, opts: [0, 1, 2, 3] },
    { q: "3 - 1 = ?", a: 2, opts: [1, 2, 3, 4] },
    { q: "2 + 4 = ?", a: 6, opts: [4, 5, 6, 7] },
    { q: "5 - 3 = ?", a: 2, opts: [1, 2, 3, 4] },
    { q: "10 - 5 = ?", a: 5, opts: [3, 4, 5, 6] },
    { q: "3 + 3 = ?", a: 6, opts: [4, 5, 6, 7] },
    { q: "4 + 4 = ?", a: 8, opts: [6, 7, 8, 9] },
  ];
  
  function getRandomQuestion() {
    return { ...mathQuestions[Math.floor(Math.random() * mathQuestions.length)] };
  }
  
  // ============================================================
  // DRAW FUNCTIONS (Retro Style)
  // ============================================================
  
  function drawGround() {
    const startX = Math.max(0, Math.floor(cameraX / TILE_SIZE));
    const endX = Math.min(MAP_WIDTH, Math.ceil((cameraX + VIEW_WIDTH) / TILE_SIZE) + 1);
    const startY = Math.max(0, Math.floor(cameraY / TILE_SIZE));
    const endY = Math.min(MAP_HEIGHT, Math.ceil((cameraY + VIEW_HEIGHT) / TILE_SIZE) + 1);
    
    for (let i = startX; i < endX; i++) {
      for (let j = startY; j < endY; j++) {
        const x = i * TILE_SIZE - cameraX;
        const y = j * TILE_SIZE - cameraY;
        ctx.fillStyle = groundColors[groundMap[i]?.[j] || 0];
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        
        // Grid lines (retro feel)
        ctx.strokeStyle = 'rgba(0,0,0,0.05)';
        ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
      }
    }
  }
  
  function drawFlowers() {
    for (const flower of flowers) {
      const x = flower.x - cameraX;
      const y = flower.y - cameraY;
      if (x < 0 || x > VIEW_WIDTH || y < 0 || y > VIEW_HEIGHT) continue;
      
      ctx.fillStyle = flower.color;
      ctx.beginPath();
      ctx.arc(x, y, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.arc(x, y, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  
  function drawTrees() {
    for (const tree of trees) {
      const x = tree.x - cameraX;
      const y = tree.y - cameraY;
      if (x + 25 < 0 || x - 25 > VIEW_WIDTH || y + 35 < 0 || y - 35 > VIEW_HEIGHT) continue;
      
      // Trunk
      ctx.fillStyle = '#8B5A2B';
      ctx.fillRect(x - 5, y + 5, 10, 20);
      
      // Leaves
      ctx.fillStyle = '#2d6e2d';
      ctx.beginPath();
      ctx.arc(x, y - 5, 16, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#3a8c3a';
      ctx.beginPath();
      ctx.arc(x - 6, y - 10, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x + 6, y - 10, 10, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#4ade80';
      ctx.beginPath();
      ctx.arc(x, y - 16, 8, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  
  function drawPlayer() {
    const x = player.x - cameraX;
    const y = player.y - cameraY;
    const walk = Math.sin(player.walkFrame * Math.PI) * 2;
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(x + 3, y + 25, 12, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Body
    ctx.fillStyle = '#3b82f6';
    ctx.fillRect(x - 10, y - 5 + walk, 20, 25);
    
    // Head
    ctx.fillStyle = '#fcd34d';
    ctx.beginPath();
    ctx.arc(x, y - 10 + walk, 12, 0, Math.PI * 2);
    ctx.fill();
    
    // Eyes
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(x - 5, y - 13 + walk, 3, 4);
    ctx.fillRect(x + 2, y - 13 + walk, 3, 4);
    
    // Cape
    ctx.fillStyle = '#fbbf24';
    ctx.fillRect(x - 8, y - 3 + walk, 16, 8);
    
    // Hat
    ctx.fillStyle = '#d97706';
    ctx.fillRect(x - 8, y - 20 + walk, 16, 6);
  }
  
  function drawPet() {
    const x = pet.x - cameraX;
    const y = pet.y - cameraY;
    const bob = Math.sin(Date.now() / 200) * 1.5;
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(x + 2, y + 22, 10, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Body
    ctx.fillStyle = '#22c55e';
    ctx.fillRect(x - 8, y - 2 + bob, 16, 20);
    
    // Head
    ctx.fillStyle = '#22c55e';
    ctx.beginPath();
    ctx.arc(x, y - 8 + bob, 10, 0, Math.PI * 2);
    ctx.fill();
    
    // Ears
    ctx.fillStyle = '#16a34a';
    ctx.fillRect(x - 10, y - 16 + bob, 6, 8);
    ctx.fillRect(x + 4, y - 16 + bob, 6, 8);
    
    // Eyes
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(x - 5, y - 11 + bob, 3, 4);
    ctx.fillRect(x + 2, y - 11 + bob, 3, 4);
    
    // Tail
    ctx.fillStyle = '#22c55e';
    ctx.fillRect(x + 10, y + 2 + bob, 8, 5);
  }
  
  function drawMapEnemy(enemy) {
    const x = enemy.x - cameraX;
    const y = enemy.y - cameraY;
    if (x < 0 || x > VIEW_WIDTH || y < 0 || y > VIEW_HEIGHT) return;
    
    const bob = Math.sin(Date.now() / 200) * 2;
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(x + 2, y + 18, 12, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Body
    ctx.fillStyle = enemy.color;
    ctx.beginPath();
    ctx.arc(x, y + 5 + bob, 14, 0, Math.PI * 2);
    ctx.fill();
    
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(x - 6, y + 2 + bob, 4, 4);
    ctx.fillRect(x + 2, y + 2 + bob, 4, 4);
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(x - 5, y + 3 + bob, 2, 3);
    ctx.fillRect(x + 3, y + 3 + bob, 2, 3);
    
    // ! mark
    ctx.fillStyle = '#ef4444';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('!', x - 12, y - 8 + bob);
  }
  
  // ============================================================
  // BATTLE SPRITES
  // ============================================================
  
  function drawBattleEnemy(enemy) {
    battleEnemyCtx.clearRect(0, 0, 160, 160);
    const bob = Math.sin(Date.now() / 200) * 2;
    
    // Shadow
    battleEnemyCtx.fillStyle = 'rgba(0,0,0,0.2)';
    battleEnemyCtx.beginPath();
    battleEnemyCtx.ellipse(80, 130, 35, 12, 0, 0, Math.PI * 2);
    battleEnemyCtx.fill();
    
    // Body
    battleEnemyCtx.fillStyle = enemy.color;
    battleEnemyCtx.beginPath();
    battleEnemyCtx.ellipse(80, 80 + bob, 45, 50, 0, 0, Math.PI * 2);
    battleEnemyCtx.fill();
    
    // Eyes
    battleEnemyCtx.fillStyle = '#fff';
    battleEnemyCtx.fillRect(60, 70 + bob, 10, 10);
    battleEnemyCtx.fillRect(90, 70 + bob, 10, 10);
    battleEnemyCtx.fillStyle = '#1a1a2e';
    battleEnemyCtx.fillRect(63, 73 + bob, 5, 5);
    battleEnemyCtx.fillRect(93, 73 + bob, 5, 5);
    
    // Mouth
    battleEnemyCtx.fillStyle = '#b45309';
    battleEnemyCtx.fillRect(73, 95 + bob, 14, 8);
    
    // Name
    battleEnemyCtx.fillStyle = 'white';
    battleEnemyCtx.font = 'bold 12px monospace';
    battleEnemyCtx.fillText(enemy.name, 55, 150);
  }
  
  function drawBattlePet() {
    battlePetCtx.clearRect(0, 0, 160, 160);
    const bob = Math.sin(Date.now() / 200) * 2;
    
    // Shadow
    battlePetCtx.fillStyle = 'rgba(0,0,0,0.2)';
    battlePetCtx.beginPath();
    battlePetCtx.ellipse(80, 130, 35, 12, 0, 0, Math.PI * 2);
    battlePetCtx.fill();
    
    // Tail
    battlePetCtx.fillStyle = '#22c55e';
    battlePetCtx.fillRect(115, 70 + bob, 15, 8);
    
    // Body
    battlePetCtx.fillStyle = '#22c55e';
    battlePetCtx.fillRect(50, 60 + bob, 60, 55);
    
    // Head
    battlePetCtx.fillStyle = '#22c55e';
    battlePetCtx.beginPath();
    battlePetCtx.arc(80, 55 + bob, 25, 0, Math.PI * 2);
    battlePetCtx.fill();
    
    // Ears
    battlePetCtx.fillStyle = '#16a34a';
    battlePetCtx.fillRect(58, 35 + bob, 8, 15);
    battlePetCtx.fillRect(94, 35 + bob, 8, 15);
    
    // Eyes
    battlePetCtx.fillStyle = '#fff';
    battlePetCtx.fillRect(68, 48 + bob, 7, 8);
    battlePetCtx.fillRect(85, 48 + bob, 7, 8);
    battlePetCtx.fillStyle = '#1a1a2e';
    battlePetCtx.fillRect(70, 50 + bob, 4, 5);
    battlePetCtx.fillRect(87, 50 + bob, 4, 5);
    
    // Nose
    battlePetCtx.fillStyle = '#ef4444';
    battlePetCtx.fillRect(78, 65 + bob, 4, 3);
    
    // Whiskers
    battlePetCtx.strokeStyle = '#fff';
    battlePetCtx.beginPath();
    battlePetCtx.moveTo(55, 65 + bob);
    battlePetCtx.lineTo(40, 62 + bob);
    battlePetCtx.stroke();
    battlePetCtx.beginPath();
    battlePetCtx.moveTo(55, 70 + bob);
    battlePetCtx.lineTo(40, 72 + bob);
    battlePetCtx.stroke();
    battlePetCtx.beginPath();
    battlePetCtx.moveTo(105, 65 + bob);
    battlePetCtx.lineTo(120, 62 + bob);
    battlePetCtx.stroke();
    battlePetCtx.beginPath();
    battlePetCtx.moveTo(105, 70 + bob);
    battlePetCtx.lineTo(120, 72 + bob);
    battlePetCtx.stroke();
  }
  
  // ============================================================
  // COLLISION & MOVEMENT
  // ============================================================
  
  function isColliding(x, y, radius) {
    for (const tree of trees) {
      const dx = x - tree.x;
      const dy = y - tree.y;
      if (Math.sqrt(dx * dx + dy * dy) < radius + 15) return true;
    }
    for (const enemy of enemies) {
      const dx = x - enemy.x;
      const dy = y - enemy.y;
      if (Math.sqrt(dx * dx + dy * dy) < radius + 20 && !inBattle) {
        startBattle(enemy);
        return true;
      }
    }
    if (x < radius || x > WORLD_WIDTH - radius) return true;
    if (y < radius || y > WORLD_HEIGHT - radius) return true;
    return false;
  }
  
  function updateMovement() {
    if (inBattle) return;
    
    let mx = 0, my = 0;
    if (keys.w) my -= 1;
    if (keys.s) my += 1;
    if (keys.a) mx -= 1;
    if (keys.d) mx += 1;
    
    if (mx !== 0 || my !== 0) {
      const len = Math.hypot(mx, my);
      mx /= len;
      my /= len;
      
      let nx = player.x + mx * player.speed;
      let ny = player.y + my * player.speed;
      
      if (!isColliding(nx, player.y, 15)) player.x = nx;
      if (!isColliding(player.x, ny, 15)) player.y = ny;
      
      player.walkFrame += 0.15;
    } else {
      player.walkFrame = 0;
    }
    
    // Pet follow
    const angle = Math.atan2(player.y - pet.y, player.x - pet.x);
    pet.x += Math.cos(angle) * 2.5;
    pet.y += Math.sin(angle) * 2.5;
    
    // Camera
    cameraX = player.x - VIEW_WIDTH / 2;
    cameraY = player.y - VIEW_HEIGHT / 2;
    cameraX = Math.max(0, Math.min(cameraX, WORLD_WIDTH - VIEW_WIDTH));
    cameraY = Math.max(0, Math.min(cameraY, WORLD_HEIGHT - VIEW_HEIGHT));
  }
  
  function updateClickMove() {
    if (inBattle) return;
    const dx = player.targetX - player.x;
    const dy = player.targetY - player.y;
    const dist = Math.hypot(dx, dy);
    
    if (dist > 3) {
      const mx = (dx / dist) * player.speed;
      const my = (dy / dist) * player.speed;
      
      let nx = player.x + mx;
      let ny = player.y + my;
      
      if (!isColliding(nx, player.y, 15)) player.x = nx;
      if (!isColliding(player.x, ny, 15)) player.y = ny;
      
      player.walkFrame += 0.15;
    } else {
      player.walkFrame = 0;
    }
  }
  
  // ============================================================
  // BATTLE SYSTEM
  // ============================================================
  
  function startBattle(enemy) {
    if (inBattle) return;
    inBattle = true;
    currentEnemy = { ...enemy };
    battleEnemyHp = currentEnemy.hp;
    battlePetHp = pet.hp;
    currentQuestion = getRandomQuestion();
    
    document.getElementById('battleEnemyName').textContent = currentEnemy.name;
    document.getElementById('battleEnemyHp').textContent = battleEnemyHp;
    document.getElementById('battleEnemyMaxHp').textContent = currentEnemy.maxHp;
    document.getElementById('battlePetHp').textContent = battlePetHp;
    document.getElementById('battlePetMaxHp').textContent = pet.maxHp;
    document.getElementById('battlePetLevel').textContent = pet.level;
    document.getElementById('battleEnemySpriteName').textContent = currentEnemy.name;
    document.getElementById('questionText').textContent = currentQuestion.q;
    document.getElementById('battleMessage').innerHTML = `Wild ${currentEnemy.name} appeared! Answer correctly to attack!`;
    
    updateBattleBars();
    drawBattleEnemy(currentEnemy);
    drawBattlePet();
    renderAnswerButtons();
    
    document.getElementById('battleScreen').classList.add('active');
  }
  
  function renderAnswerButtons() {
    const container = document.getElementById('answerButtons');
    container.innerHTML = '';
    currentQuestion.opts.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.textContent = opt;
      btn.onclick = () => handleAnswer(opt);
      container.appendChild(btn);
    });
  }
  
  function updateBattleBars() {
    const enemyPercent = (battleEnemyHp / currentEnemy.maxHp) * 100;
    const petPercent = (battlePetHp / pet.maxHp) * 100;
    document.getElementById('battleEnemyHpFill').style.width = `${Math.max(0, enemyPercent)}%`;
    document.getElementById('battlePetHpFill').style.width = `${Math.max(0, petPercent)}%`;
    document.getElementById('battleEnemyHp').textContent = Math.max(0, battleEnemyHp);
    document.getElementById('battlePetHp').textContent = Math.max(0, battlePetHp);
  }
  
  async function handleAnswer(answer) {
    if (isAnimating || !inBattle) return;
    isAnimating = true;
    
    // Attack animation
    const enemySprite = document.getElementById('battleEnemyCanvas');
    enemySprite.classList.add('shake-animation', 'flash-animation');
    setTimeout(() => {
      enemySprite.classList.remove('shake-animation', 'flash-animation');
    }, 300);
    
    if (answer === currentQuestion.a) {
      const damage = Math.floor(Math.random() * 12) + 10;
      battleEnemyHp -= damage;
      document.getElementById('battleMessage').innerHTML = `Correct! Mewt dealt ${damage} damage!`;
      updateBattleBars();
      
      if (battleEnemyHp <= 0) {
        setTimeout(() => winBattle(), 800);
        isAnimating = false;
        return;
      }
      
      setTimeout(() => enemyAttack(), 1000);
    } else {
      document.getElementById('battleMessage').innerHTML = `Wrong! The answer was ${currentQuestion.a}. ${currentEnemy.name} attacks!`;
      
      const damage = Math.floor(Math.random() * currentEnemy.attack) + 5;
      const reduced = Math.max(1, damage - Math.floor(pet.defense / 3));
      battlePetHp -= reduced;
      updateBattleBars();
      
      const petSprite = document.getElementById('battlePetCanvas');
      petSprite.classList.add('shake-animation', 'flash-animation');
      setTimeout(() => {
        petSprite.classList.remove('shake-animation', 'flash-animation');
      }, 300);
      
      if (battlePetHp <= 0) {
        setTimeout(() => loseBattle(), 800);
        isAnimating = false;
        return;
      }
      
      currentQuestion = getRandomQuestion();
      document.getElementById('questionText').textContent = currentQuestion.q;
      renderAnswerButtons();
      document.getElementById('battleMessage').innerHTML = `What will Mewt do?`;
    }
    
    isAnimating = false;
  }
  
  function enemyAttack() {
    if (!inBattle || battleEnemyHp <= 0) return;
    
    const damage = Math.floor(Math.random() * currentEnemy.attack) + 5;
    const reduced = Math.max(1, damage - Math.floor(pet.defense / 3));
    battlePetHp -= reduced;
    document.getElementById('battleMessage').innerHTML = `${currentEnemy.name} attacked! Dealt ${reduced} damage!`;
    updateBattleBars();
    
    const petSprite = document.getElementById('battlePetCanvas');
    petSprite.classList.add('shake-animation', 'flash-animation');
    setTimeout(() => {
      petSprite.classList.remove('shake-animation', 'flash-animation');
    }, 300);
    
    if (battlePetHp <= 0) {
      setTimeout(() => loseBattle(), 800);
      return;
    }
    
    currentQuestion = getRandomQuestion();
    document.getElementById('questionText').textContent = currentQuestion.q;
    renderAnswerButtons();
    document.getElementById('battleMessage').innerHTML = `What will Mewt do?`;
  }
  
  function winBattle() {
    const expGain = currentEnemy.exp;
    const coinGain = 20 + Math.floor(Math.random() * 20);
    
    player.xp += expGain;
    player.coins += coinGain;
    pet.hp = Math.min(pet.hp + Math.floor(pet.maxHp * 0.3), pet.maxHp);
    battlePetHp = pet.hp;
    
    document.getElementById('battleMessage').innerHTML = `Victory! +${expGain} XP, +${coinGain} coins!`;
    updateUI();
    
    if (player.xp >= player.xpNeeded) {
      player.level++;
      player.xp -= player.xpNeeded;
      player.xpNeeded = Math.floor(player.xpNeeded * 1.4);
      pet.level++;
      pet.maxHp += 8;
      pet.hp = pet.maxHp;
      pet.attack += 3;
      pet.defense += 2;
      document.getElementById('battleMessage').innerHTML += ` 🌟 Mewt grew to Lv${pet.level}! 🌟`;
      updateUI();
    }
    
    // Remove defeated enemy
    const index = enemies.findIndex(e => e.x === currentEnemy.x && e.y === currentEnemy.y);
    if (index !== -1) enemies.splice(index, 1);
    
    updateBattleBars();
    updateUI();
    
    setTimeout(() => {
      document.getElementById('battleScreen').classList.remove('active');
      inBattle = false;
      currentEnemy = null;
      isAnimating = false;
    }, 2500);
  }
  
  function loseBattle() {
    document.getElementById('battleMessage').innerHTML = `Mewt fainted... Running away to heal!`;
    pet.hp = pet.maxHp;
    battlePetHp = pet.hp;
    updateUI();
    updateBattleBars();
    
    setTimeout(() => {
      document.getElementById('battleScreen').classList.remove('active');
      inBattle = false;
      currentEnemy = null;
      isAnimating = false;
    }, 2000);
  }
  
  function runBattle() {
    document.getElementById('battleMessage').innerHTML = `Got away safely!`;
    setTimeout(() => {
      document.getElementById('battleScreen').classList.remove('active');
      inBattle = false;
      currentEnemy = null;
      isAnimating = false;
    }, 800);
  }
  
  // ============================================================
  // UI UPDATES
  // ============================================================
  
  function updateUI() {
    const xpPercent = (player.xp / player.xpNeeded) * 100;
    document.getElementById('xpFill').style.width = `${Math.min(100, xpPercent)}%`;
    document.getElementById('xpCurrent').textContent = player.xp;
    document.getElementById('xpNeeded').textContent = player.xpNeeded;
    document.getElementById('playerLevelBadge').textContent = `Lv${player.level}`;
    document.getElementById('coinAmount').textContent = player.coins;
    document.getElementById('battlePetLevel').textContent = pet.level;
  }
  
  // ============================================================
  // EVENT HANDLERS
  // ============================================================
  
  canvas.addEventListener('click', (e) => {
    if (inBattle) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * scaleX;
    const my = (e.clientY - rect.top) * scaleY;
    player.targetX = cameraX + mx;
    player.targetY = cameraY + my;
  });
  
  document.addEventListener('keydown', (e) => {
    if (inBattle) return;
    const key = e.key.toLowerCase();
    if (key === 'w') keys.w = true;
    if (key === 's') keys.s = true;
    if (key === 'a') keys.a = true;
    if (key === 'd') keys.d = true;
    if (['w','s','a','d'].includes(key)) {
      player.targetX = player.x;
      player.targetY = player.y;
    }
  });
  
  document.addEventListener('keyup', (e) => {
    const key = e.key.toLowerCase();
    if (key === 'w') keys.w = false;
    if (key === 's') keys.s = false;
    if (key === 'a') keys.a = false;
    if (key === 'd') keys.d = false;
  });
  
  document.getElementById('runBattleBtn').onclick = () => runBattle();
  document.getElementById('teamBtn').onclick = () => alert(`🐱 MEWT - Lv${pet.level}\n❤️ HP: ${pet.hp}/${pet.maxHp}\n⚔️ ATK: ${pet.attack}\n🛡️ DEF: ${pet.defense}`);
  document.getElementById('bagBtn').onclick = () => alert(`🎒 YOUR BAG\n🪙 ${player.coins} coins\n⭐ ${player.xp} XP`);
  document.getElementById('mewtBtn').onclick = () => alert(`⭐ MEWT - Your companion!\nLevel: ${pet.level}\nHP: ${pet.hp}/${pet.maxHp}\nAttack: ${pet.attack}\nDefense: ${pet.defense}`);
  document.getElementById('settingsBtn').onclick = () => alert(`⚙️ CONTROLS\nWASD or Click to move\nTouch enemies to battle!\nAnswer math to attack!`);
  
  // ============================================================
  // ANIMATION LOOP
  // ============================================================
  
  function animate() {
    if (!inBattle) {
      updateMovement();
      updateClickMove();
    }
    
    // Sky
    ctx.fillStyle = '#7dd3fc';
    ctx.fillRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);
    
    drawGround();
    drawFlowers();
    drawTrees();
    
    for (const enemy of enemies) {
      drawMapEnemy(enemy);
    }
    
    drawPet();
    drawPlayer();
    
    requestAnimationFrame(animate);
  }
  
  updateUI();
  animate();
</script>
