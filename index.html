<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fanter World - Prodigy Style RPG</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: linear-gradient(135deg, #0a0a2a, #1a1a3a);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    .game-wrapper {
      position: relative;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 3px solid #ffcc00;
    }

    canvas {
      display: block;
      margin: 0 auto;
      cursor: crosshair;
      border-radius: 10px;
    }

    /* UI Panels */
    .ui-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 12px 24px;
      color: white;
      border-left: 4px solid #ffcc00;
      z-index: 10;
      font-size: 14px;
      font-weight: 500;
      pointer-events: none;
      font-family: 'Segoe UI', sans-serif;
    }

    .ui-panel span {
      color: #ffcc00;
      font-weight: bold;
    }

    .pet-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 12px 24px;
      color: white;
      border-left: 4px solid #9f5ae3;
      z-index: 10;
      min-width: 200px;
      pointer-events: none;
      font-family: 'Segoe UI', sans-serif;
    }

    .pet-panel .pet-name {
      color: #9f5ae3;
      font-weight: bold;
      font-size: 16px;
    }

    .pet-stats {
      display: flex;
      gap: 15px;
      margin-top: 5px;
      font-size: 12px;
    }

    .hp-bar {
      background: #ff4466;
      border-radius: 10px;
      padding: 2px 8px;
      display: inline-block;
      font-size: 11px;
    }

    .controls-hint {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 8px 15px;
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      z-index: 10;
      pointer-events: none;
      font-family: 'Segoe UI', sans-serif;
    }

    /* Battle Panel - Prodigy Style */
    .battle-panel {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
      backdrop-filter: blur(20px);
      border-radius: 30px;
      padding: 20px 30px;
      color: white;
      border: 2px solid #ffcc00;
      z-index: 20;
      display: none;
      min-width: 500px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      animation: battleAppear 0.3s ease;
      font-family: 'Segoe UI', sans-serif;
    }

    .battle-panel.active {
      display: block;
    }

    @keyframes battleAppear {
      from {
        opacity: 0;
        transform: translateX(-50%) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) scale(1);
      }
    }

    .battle-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .enemy-info, .player-info {
      text-align: center;
    }

    .enemy-name {
      color: #ff4466;
      font-weight: bold;
      font-size: 20px;
    }

    .enemy-hp-bar, .pet-hp-bar {
      width: 180px;
      height: 12px;
      background: #333;
      border-radius: 10px;
      overflow: hidden;
      margin: 8px 0;
    }

    .enemy-hp-fill, .pet-hp-fill {
      height: 100%;
      background: linear-gradient(90deg, #00e87a, #00cc66);
      width: 100%;
      transition: width 0.3s;
    }

    .battle-question {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
      margin: 20px 0;
      font-size: 28px;
      font-weight: bold;
    }

    .battle-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 15px;
    }

    .battle-btn {
      background: linear-gradient(135deg, #2d5ae3, #1a3bc0);
      border: none;
      border-radius: 50px;
      padding: 12px 20px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Segoe UI', sans-serif;
      font-size: 18px;
    }

    .battle-btn:hover {
      transform: scale(1.05);
      background: linear-gradient(135deg, #3d6af3, #2a4bd0);
      box-shadow: 0 0 15px rgba(45,90,227,0.5);
    }

    .battle-message {
      margin-top: 15px;
      font-size: 13px;
      color: #ffcc00;
    }

    .close-battle {
      background: rgba(255,68,102,0.3);
      border: 1px solid #ff4466;
      margin-top: 10px;
    }

    .close-battle:hover {
      background: rgba(255,68,102,0.5);
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <canvas id="gameCanvas" width="1400" height="800"></canvas>
  
  <div class="ui-panel">
    🗺️ FANTER WORLD | <span>✨ Level <span id="playerLevel">1</span></span> | ⭐ XP: <span id="xpCount">0</span>/<span id="xpNeeded">100</span>
  </div>
  
  <div class="pet-panel">
    🐱 <span class="pet-name" id="petName">MEWT</span> <span id="petLevel">(Lv 1)</span><br>
    <div class="pet-stats">
      <span>❤️ <span id="petHp">30</span>/<span id="petMaxHp">30</span></span>
      <span>⚔️ <span id="petAttack">8-12</span></span>
    </div>
  </div>
  
  <div class="controls-hint">
    🎮 WASD or Click to Move | 🐱 Pet Follows | ⚔️ Touch Enemy = Battle
  </div>
  
  <div class="battle-panel" id="battlePanel">
    <div class="battle-header">
      <div class="enemy-info">
        <div class="enemy-name" id="enemyName">Slime</div>
        <div class="enemy-hp-bar"><div class="enemy-hp-fill" id="enemyHpFill" style="width: 100%"></div></div>
        <div>❤️ <span id="enemyHp">25</span>/<span id="enemyMaxHp">25</span></div>
      </div>
      <div class="player-info">
        <div>🐱 <strong>Mewt</strong></div>
        <div class="pet-hp-bar"><div class="pet-hp-fill" id="battlePetHpFill" style="width: 100%"></div></div>
        <div>❤️ <span id="battlePetHp">30</span>/<span id="battlePetMaxHp">30</span></div>
      </div>
    </div>
    
    <div class="battle-question" id="battleQuestion">
      2 + 2 = ?
    </div>
    
    <div class="battle-options" id="battleOptions"></div>
    
    <div class="battle-message" id="battleMessage">
      Answer correctly to attack!
    </div>
    
    <button class="battle-btn close-battle" id="closeBattleBtn">🏃 Run Away</button>
  </div>
</div>

<script>
  // ============================================================
  // FANTER WORLD - PRODIGY STYLE WITH SMOOTH MOVEMENT
  // ============================================================
  
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  
  // ============================================================
  // WORLD SETUP
  // ============================================================
  const WORLD_WIDTH = 2500;
  const WORLD_HEIGHT = 2500;
  const VIEW_WIDTH = 1400;
  const VIEW_HEIGHT = 800;
  
  let cameraX = 0;
  let cameraY = 0;
  
  // Generate beautiful terrain
  const terrain = [];
  const trees = [];
  const flowers = [];
  
  // Create terrain grid
  for (let i = 0; i < 100; i++) {
    terrain[i] = [];
    for (let j = 0; j < 100; j++) {
      let height = 0;
      height += Math.sin(i * 0.1) * Math.cos(j * 0.1) * 2;
      height += Math.sin(i * 0.3 + j * 0.2) * 1;
      height += Math.random() * 0.5;
      terrain[i][j] = Math.max(0, Math.min(4, Math.floor(height + 2)));
    }
  }
  
  // Add trees
  for (let i = 0; i < 80; i++) {
    trees.push({
      x: Math.random() * WORLD_WIDTH,
      y: Math.random() * WORLD_HEIGHT,
      size: 30 + Math.random() * 20
    });
  }
  
  // Add flowers
  for (let i = 0; i < 200; i++) {
    flowers.push({
      x: Math.random() * WORLD_WIDTH,
      y: Math.random() * WORLD_HEIGHT,
      color: ['#ff69b4', '#ffcc00', '#9f5ae3', '#00e87a'][Math.floor(Math.random() * 4)]
    });
  }
  
  // Enemies
  const enemies = [
    { x: 500, y: 400, name: 'Slime', hp: 25, maxHp: 25, attack: 5, color: '#44ff88', size: 35 },
    { x: 1200, y: 600, name: 'Goblin', hp: 35, maxHp: 35, attack: 7, color: '#ff8844', size: 40 },
    { x: 800, y: 1500, name: 'Bat', hp: 20, maxHp: 20, attack: 6, color: '#8844ff', size: 30 },
    { x: 2000, y: 1000, name: 'Truffle', hp: 40, maxHp: 40, attack: 8, color: '#ff66cc', size: 45 },
    { x: 300, y: 2000, name: 'Wolf', hp: 45, maxHp: 45, attack: 10, color: '#888888', size: 42 },
    { x: 1800, y: 1800, name: 'Mage', hp: 30, maxHp: 30, attack: 12, color: '#6699ff', size: 38 },
  ];
  
  // ============================================================
  // PLAYER & PET - SMOOTH MOVEMENT
  // ============================================================
  const player = {
    x: WORLD_WIDTH / 2,
    y: WORLD_HEIGHT / 2,
    vx: 0,
    vy: 0,
    targetX: WORLD_WIDTH / 2,
    targetY: WORLD_HEIGHT / 2,
    speed: 3,
    direction: 'down',
    walkFrame: 0,
    level: 1,
    xp: 0,
    xpNeeded: 100,
    invincibleTimer: 0
  };
  
  const pet = {
    x: WORLD_WIDTH / 2 - 40,
    y: WORLD_HEIGHT / 2,
    vx: 0,
    vy: 0,
    hp: 30,
    maxHp: 30,
    attack: 10,
    level: 1
  };
  
  // Battle state
  let inBattle = false;
  let currentEnemy = null;
  let currentQuestion = null;
  let battleMessage = '';
  let battlePetHp = pet.hp;
  let battleEnemyHp = 0;
  
  // Movement flags
  const keys = { w: false, s: false, a: false, d: false };
  
  // ============================================================
  // MATH QUESTIONS (Kindergarten Level)
  // ============================================================
  const mathQuestions = [
    { question: "1 + 1 = ?", answer: 2, options: [0, 1, 2, 3] },
    { question: "2 + 2 = ?", answer: 4, options: [2, 3, 4, 5] },
    { question: "3 + 1 = ?", answer: 4, options: [2, 3, 4, 5] },
    { question: "5 - 2 = ?", answer: 3, options: [1, 2, 3, 4] },
    { question: "2 + 3 = ?", answer: 5, options: [3, 4, 5, 6] },
    { question: "4 - 1 = ?", answer: 3, options: [1, 2, 3, 4] },
    { question: "1 + 0 = ?", answer: 1, options: [0, 1, 2, 3] },
    { question: "3 - 1 = ?", answer: 2, options: [1, 2, 3, 4] },
    { question: "2 + 4 = ?", answer: 6, options: [4, 5, 6, 7] },
    { question: "5 - 3 = ?", answer: 2, options: [1, 2, 3, 4] },
    { question: "What is 10 - 5?", answer: 5, options: [3, 4, 5, 6] },
    { question: "3 + 3 = ?", answer: 6, options: [4, 5, 6, 7] },
    { question: "4 + 4 = ?", answer: 8, options: [6, 7, 8, 9] },
  ];
  
  function getRandomQuestion() {
    return { ...mathQuestions[Math.floor(Math.random() * mathQuestions.length)] };
  }
  
  // ============================================================
  // COLLISION DETECTION
  // ============================================================
  function isColliding(x, y, radius) {
    // Tree collision
    for (const tree of trees) {
      const dx = x - tree.x;
      const dy = y - tree.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < radius + tree.size / 2) return true;
    }
    
    // Enemy collision (for battle trigger)
    for (const enemy of enemies) {
      const dx = x - enemy.x;
      const dy = y - enemy.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < radius + enemy.size / 2 && !inBattle) {
        startBattle(enemy);
        return true;
      }
    }
    
    // World bounds
    if (x - radius < 0) return true;
    if (x + radius > WORLD_WIDTH) return true;
    if (y - radius < 0) return true;
    if (y + radius > WORLD_HEIGHT) return true;
    
    return false;
  }
  
  // ============================================================
  // MOVEMENT SYSTEM
  // ============================================================
  function updateMovement() {
    if (inBattle) return;
    
    // Handle WASD input
    let moveX = 0;
    let moveY = 0;
    if (keys.w) moveY -= 1;
    if (keys.s) moveY += 1;
    if (keys.a) moveX -= 1;
    if (keys.d) moveX += 1;
    
    if (moveX !== 0 || moveY !== 0) {
      const len = Math.hypot(moveX, moveY);
      moveX /= len;
      moveY /= len;
      
      let newX = player.x + moveX * player.speed;
      let newY = player.y + moveY * player.speed;
      
      if (!isColliding(newX, player.y, 20)) {
        player.x = newX;
      }
      if (!isColliding(player.x, newY, 20)) {
        player.y = newY;
      }
      
      // Update direction for animation
      if (Math.abs(moveX) > Math.abs(moveY)) {
        player.direction = moveX > 0 ? 'right' : 'left';
      } else {
        player.direction = moveY > 0 ? 'down' : 'up';
      }
      
      player.walkFrame += 0.2;
    } else {
      player.walkFrame = 0;
    }
    
    // Pet following behavior
    const angle = Math.atan2(player.y - pet.y, player.x - pet.x);
    const followSpeed = 2.5;
    let petMoveX = Math.cos(angle) * followSpeed;
    let petMoveY = Math.sin(angle) * followSpeed;
    
    let newPetX = pet.x + petMoveX;
    let newPetY = pet.y + petMoveY;
    
    // Don't let pet get too close to trees
    if (!isColliding(newPetX, pet.y, 15)) {
      pet.x = newPetX;
    }
    if (!isColliding(pet.x, newPetY, 15)) {
      pet.y = newPetY;
    }
    
    // Update camera to follow player
    cameraX = player.x - VIEW_WIDTH / 2;
    cameraY = player.y - VIEW_HEIGHT / 2;
    cameraX = Math.max(0, Math.min(cameraX, WORLD_WIDTH - VIEW_WIDTH));
    cameraY = Math.max(0, Math.min(cameraY, WORLD_HEIGHT - VIEW_HEIGHT));
  }
  
  // ============================================================
  // DRAW BEAUTIFUL TERRAIN
  // ============================================================
  function drawGround() {
    const startX = Math.max(0, Math.floor(cameraX / 25));
    const endX = Math.min(100, Math.ceil((cameraX + VIEW_WIDTH) / 25));
    const startY = Math.max(0, Math.floor(cameraY / 25));
    const endY = Math.min(100, Math.ceil((cameraY + VIEW_HEIGHT) / 25));
    
    for (let i = startX; i < endX; i++) {
      for (let j = startY; j < endY; j++) {
        const x = i * 25 - cameraX;
        const y = j * 25 - cameraY;
        
        let color;
        switch(terrain[j][i]) {
          case 0: color = '#2d5a27'; break;
          case 1: color = '#3a6b33'; break;
          case 2: color = '#4a7c3f'; break;
          case 3: color = '#5a8d4b'; break;
          default: color = '#6b9e57';
        }
        
        ctx.fillStyle = color;
        ctx.fillRect(x, y, 26, 26);
        
        // Add noise texture
        ctx.fillStyle = 'rgba(0,0,0,0.05)';
        ctx.fillRect(x + Math.random() * 20, y + Math.random() * 20, 3, 3);
      }
    }
  }
  
  // ============================================================
  // DRAW TREES (Detailed)
  // ============================================================
  function drawTrees() {
    for (const tree of trees) {
      const x = tree.x - cameraX;
      const y = tree.y - cameraY;
      if (x + 50 < 0 || x - 50 > VIEW_WIDTH || y + 50 < 0 || y - 50 > VIEW_HEIGHT) continue;
      
      // Trunk
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(x - 8, y + 10, 16, 25);
      
      // Leaves (layered circles)
      ctx.fillStyle = '#2d6e2d';
      ctx.beginPath();
      ctx.ellipse(x, y - 5, 22, 25, 0, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#3a8c3a';
      ctx.beginPath();
      ctx.ellipse(x - 8, y - 12, 15, 18, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(x + 8, y - 12, 15, 18, 0, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.fillStyle = '#44aa44';
      ctx.beginPath();
      ctx.ellipse(x, y - 20, 12, 14, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  
  // ============================================================
  // DRAW FLOWERS
  // ============================================================
  function drawFlowers() {
    for (const flower of flowers) {
      const x = flower.x - cameraX;
      const y = flower.y - cameraY;
      if (x + 10 < 0 || x - 10 > VIEW_WIDTH || y + 10 < 0 || y - 10 > VIEW_HEIGHT) continue;
      
      ctx.fillStyle = flower.color;
      ctx.beginPath();
      ctx.ellipse(x, y, 4, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.ellipse(x, y, 2, 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  
  // ============================================================
  // DRAW PLAYER (Detailed Character)
  // ============================================================
  function drawPlayer() {
    const x = player.x - cameraX;
    const y = player.y - cameraY;
    const bob = Math.sin(Date.now() / 150) * 2;
    const walkOffset = Math.sin(player.walkFrame * Math.PI) * 3;
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(x + 5, y + 35, 20, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Body
    ctx.fillStyle = '#2d5ae3';
    ctx.beginPath();
    ctx.roundRect(x - 15, y - 10 + bob + walkOffset, 30, 35, 10);
    ctx.fill();
    
    // Head
    ctx.fillStyle = '#ffcc99';
    ctx.beginPath();
    ctx.ellipse(x, y - 10 + bob + walkOffset, 18, 20, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Hair
    ctx.fillStyle = '#8B4513';
    ctx.beginPath();
    ctx.ellipse(x, y - 22 + bob + walkOffset, 16, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Eyes
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.ellipse(x - 7, y - 14 + bob + walkOffset, 5, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 7, y - 14 + bob + walkOffset, 5, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#1a1a2a';
    ctx.beginPath();
    ctx.ellipse(x - 7, y - 13 + bob + walkOffset, 3, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 7, y - 13 + bob + walkOffset, 3, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Eye shine
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.ellipse(x - 9, y - 16 + bob + walkOffset, 1.5, 1.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 5, y - 16 + bob + walkOffset, 1.5, 1.5, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Mouth
    ctx.fillStyle = '#cc6644';
    ctx.beginPath();
    ctx.ellipse(x, y - 4 + bob + walkOffset, 6, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Cape (Prodigy style)
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.moveTo(x - 12, y + 5 + bob + walkOffset);
    ctx.lineTo(x, y + 20 + bob + walkOffset);
    ctx.lineTo(x + 12, y + 5 + bob + walkOffset);
    ctx.fill();
  }
  
  // ============================================================
  // DRAW PET (Green Cat)
  // ============================================================
  function drawPet() {
    const x = pet.x - cameraX;
    const y = pet.y - cameraY;
    const bob = Math.sin(Date.now() / 120) * 1.5;
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(x + 3, y + 28, 15, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Body
    ctx.fillStyle = '#44cc66';
    ctx.beginPath();
    ctx.roundRect(x - 12, y - 5 + bob, 24, 28, 10);
    ctx.fill();
    
    // Head
    ctx.fillStyle = '#44cc66';
    ctx.beginPath();
    ctx.ellipse(x, y - 8 + bob, 14, 16, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Ears
    ctx.fillStyle = '#33aa55';
    ctx.beginPath();
    ctx.moveTo(x - 12, y - 18 + bob);
    ctx.lineTo(x - 18, y - 28 + bob);
    ctx.lineTo(x - 6, y - 20 + bob);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + 12, y - 18 + bob);
    ctx.lineTo(x + 18, y - 28 + bob);
    ctx.lineTo(x + 6, y - 20 + bob);
    ctx.fill();
    
    // Eyes (big cute cat eyes)
    ctx.fillStyle = '#ffff99';
    ctx.beginPath();
    ctx.ellipse(x - 5, y - 10 + bob, 4, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 5, y - 10 + bob, 4, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#1a1a2a';
    ctx.beginPath();
    ctx.ellipse(x - 5, y - 9 + bob, 2.5, 3.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 5, y - 9 + bob, 2.5, 3.5, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Nose
    ctx.fillStyle = '#ff8888';
    ctx.beginPath();
    ctx.ellipse(x, y - 4 + bob, 2, 2, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Whiskers
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x - 12, y - 6 + bob);
    ctx.lineTo(x - 22, y - 8 + bob);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x - 12, y - 4 + bob);
    ctx.lineTo(x - 22, y - 4 + bob);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 12, y - 6 + bob);
    ctx.lineTo(x + 22, y - 8 + bob);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 12, y - 4 + bob);
    ctx.lineTo(x + 22, y - 4 + bob);
    ctx.stroke();
    
    // Tail
    ctx.fillStyle = '#44cc66';
    ctx.beginPath();
    ctx.moveTo(x + 14, y + 10 + bob);
    ctx.quadraticCurveTo(x + 28, y + 5 + bob, x + 24, y - 5 + bob);
    ctx.lineTo(x + 20, y - 2 + bob);
    ctx.fill();
  }
  
  // ============================================================
  // DRAW ENEMY
  // ============================================================
  function drawEnemy(enemy) {
    const x = enemy.x - cameraX;
    const y = enemy.y - cameraY;
    if (x + 50 < 0 || x - 50 > VIEW_WIDTH || y + 50 < 0 || y - 50 > VIEW_HEIGHT) return;
    
    const bob = Math.sin(Date.now() / 200) * 2;
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(x, y + 25, 20, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Body
    ctx.fillStyle = enemy.color;
    ctx.beginPath();
    ctx.ellipse(x, y + 5 + bob, enemy.size / 1.5, enemy.size / 1.2, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Eyes
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.ellipse(x - 10, y - 5 + bob, 6, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 10, y - 5 + bob, 6, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#1a1a2a';
    ctx.beginPath();
    ctx.ellipse(x - 10, y - 4 + bob, 3, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + 10, y - 4 + bob, 3, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Mouth
    ctx.fillStyle = '#cc6644';
    ctx.beginPath();
    ctx.ellipse(x, y + 8 + bob, 8, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Name tag
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(x - 35, y - 35, 70, 22);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 12px "Segoe UI"';
    ctx.fillText(enemy.name, x - 25, y - 20);
  }
  
  // ============================================================
  // BATTLE SYSTEM
  // ============================================================
  function startBattle(enemy) {
    if (inBattle) return;
    inBattle = true;
    currentEnemy = { ...enemy, hp: enemy.hp, maxHp: enemy.maxHp };
    battleEnemyHp = currentEnemy.hp;
    battlePetHp = pet.hp;
    currentQuestion = getRandomQuestion();
    battleMessage = 'Answer correctly to attack!';
    
    document.getElementById('enemyName').textContent = currentEnemy.name;
    document.getElementById('enemyHp').textContent = battleEnemyHp;
    document.getElementById('enemyMaxHp').textContent = currentEnemy.maxHp;
    document.getElementById('battlePetHp').textContent = battlePetHp;
    document.getElementById('battlePetMaxHp').textContent = pet.maxHp;
    document.getElementById('battleQuestion').textContent = currentQuestion.question;
    document.getElementById('battleMessage').textContent = battleMessage;
    
    updateBattleHpBars();
    renderBattleOptions();
    document.getElementById('battlePanel').classList.add('active');
  }
  
  function updateBattleHpBars() {
    const enemyPercent = (battleEnemyHp / currentEnemy.maxHp) * 100;
    const petPercent = (battlePetHp / pet.maxHp) * 100;
    document.getElementById('enemyHpFill').style.width = `${Math.max(0, enemyPercent)}%`;
    document.getElementById('battlePetHpFill').style.width = `${Math.max(0, petPercent)}%`;
    document.getElementById('enemyHp').textContent = Math.max(0, battleEnemyHp);
    document.getElementById('battlePetHp').textContent = Math.max(0, battlePetHp);
  }
  
  function renderBattleOptions() {
    const container = document.getElementById('battleOptions');
    container.innerHTML = '';
    currentQuestion.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'battle-btn';
      btn.textContent = opt;
      btn.onclick = () => handleBattleAnswer(opt);
      container.appendChild(btn);
    });
  }
  
  function handleBattleAnswer(answer) {
    if (!inBattle) return;
    
    if (answer === currentQuestion.answer) {
      const damage = Math.floor(Math.random() * 8) + 8;
      battleEnemyHp -= damage;
      battleMessage = `✨ Correct! Mewt deals ${damage} damage!`;
      
      if (battleEnemyHp <= 0) {
        winBattle();
        return;
      }
      
      const enemyDamage = Math.floor(Math.random() * currentEnemy.attack) + 3;
      battlePetHp -= enemyDamage;
      battleMessage += `\n💔 ${currentEnemy.name} deals ${enemyDamage} damage!`;
      
      if (battlePetHp <= 0) {
        loseBattle();
        return;
      }
    } else {
      battleMessage = `❌ Wrong! The answer was ${currentQuestion.answer}.`;
      const enemyDamage = Math.floor(Math.random() * currentEnemy.attack) + 3;
      battlePetHp -= enemyDamage;
      battleMessage += `\n💔 ${currentEnemy.name} deals ${enemyDamage} damage!`;
      
      if (battlePetHp <= 0) {
        loseBattle();
        return;
      }
    }
    
    currentQuestion = getRandomQuestion();
    document.getElementById('battleQuestion').textContent = currentQuestion.question;
    document.getElementById('battleMessage').textContent = battleMessage;
    updateBattleHpBars();
    renderBattleOptions();
  }
  
  function winBattle() {
    battleMessage = `🎉 Victory! You defeated ${currentEnemy.name}! +25 XP`;
    document.getElementById('battleMessage').textContent = battleMessage;
    
    const xpGain = 25;
    player.xp += xpGain;
    document.getElementById('xpCount').textContent = player.xp;
    
    if (player.xp >= player.xpNeeded) {
      player.xp -= player.xpNeeded;
      player.level++;
      pet.hp = pet.maxHp + 10;
      pet.maxHp += 10;
      pet.attack += 3;
      battlePetHp = pet.hp;
      player.xpNeeded = Math.floor(player.xpNeeded * 1.5);
      document.getElementById('playerLevel').textContent = player.level;
      document.getElementById('petLevel').textContent = `(Lv ${player.level})`;
      document.getElementById('petAttack').textContent = `${pet.attack}-${pet.attack + 4}`;
      battleMessage += `\n🌟 Level up! You're now level ${player.level}!`;
    }
    document.getElementById('xpNeeded').textContent = player.xpNeeded;
    
    const index = enemies.findIndex(e => e.x === currentEnemy.x && e.y === currentEnemy.y);
    if (index !== -1) enemies.splice(index, 1);
    
    pet.hp = Math.min(pet.hp + 15, pet.maxHp);
    battlePetHp = pet.hp;
    document.getElementById('petHp').textContent = Math.floor(pet.hp);
    document.getElementById('petMaxHp').textContent = pet.maxHp;
    
    updateBattleHpBars();
    
    setTimeout(() => {
      document.getElementById('battlePanel').classList.remove('active');
      inBattle = false;
      currentEnemy = null;
    }, 2000);
  }
  
  function loseBattle() {
    battleMessage = `💀 You were defeated! Running away to heal...`;
    document.getElementById('battleMessage').textContent = battleMessage;
    
    pet.hp = pet.maxHp;
    battlePetHp = pet.hp;
    document.getElementById('petHp').textContent = Math.floor(pet.hp);
    updateBattleHpBars();
    
    setTimeout(() => {
      document.getElementById('battlePanel').classList.remove('active');
      inBattle = false;
      currentEnemy = null;
    }, 2000);
  }
  
  function runFromBattle() {
    battleMessage = `🏃 You ran away!`;
    document.getElementById('battleMessage').textContent = battleMessage;
    setTimeout(() => {
      document.getElementById('battlePanel').classList.remove('active');
      inBattle = false;
      currentEnemy = null;
    }, 1000);
  }
  
  // ============================================================
  // CLICK TO MOVE (Smooth)
  // ============================================================
  canvas.addEventListener('click', (e) => {
    if (inBattle) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mouseX = (e.clientX - rect.left) * scaleX;
    const mouseY = (e.clientY - rect.top) * scaleY;
    
    const worldX = cameraX + mouseX;
    const worldY = cameraY + mouseY;
    
    const dx = worldX - player.x;
    const dy = worldY - player.y;
    const dist = Math.hypot(dx, dy);
    
    if (dist > 5) {
      const angle = Math.atan2(dy, dx);
      player.targetX = worldX;
      player.targetY = worldY;
    }
  });
  
  // Smooth click movement
  function updateClickMovement() {
    if (inBattle) return;
    const dx = player.targetX - player.x;
    const dy = player.targetY - player.y;
    const dist = Math.hypot(dx, dy);
    
    if (dist > 5) {
      const moveX = (dx / dist) * player.speed;
      const moveY = (dy / dist) * player.speed;
      
      let newX = player.x + moveX;
      let newY = player.y + moveY;
      
      if (!isColliding(newX, player.y, 20)) {
        player.x = newX;
      }
      if (!isColliding(player.x, newY, 20)) {
        player.y = newY;
      }
      
      if (Math.abs(moveX) > Math.abs(moveY)) {
        player.direction = moveX > 0 ? 'right' : 'left';
      } else if (Math.abs(moveY) > 0) {
        player.direction = moveY > 0 ? 'down' : 'up';
      }
      
      player.walkFrame += 0.2;
    } else {
      player.walkFrame = 0;
    }
  }
  
  // ============================================================
  // KEYBOARD CONTROLS
  // ============================================================
  document.addEventListener('keydown', (e) => {
    if (inBattle) return;
    const key = e.key.toLowerCase();
    if (key === 'w') keys.w = true;
    if (key === 's') keys.s = true;
    if (key === 'a') keys.a = true;
    if (key === 'd') keys.d = true;
    
    // Reset target when using WASD
    if (['w', 's', 'a', 'd'].includes(key)) {
      player.targetX = player.x;
      player.targetY = player.y;
    }
  });
  
  document.addEventListener('keyup', (e) => {
    const key = e.key.toLowerCase();
    if (key === 'w') keys.w = false;
    if (key === 's') keys.s = false;
    if (key === 'a') keys.a = false;
    if (key === 'd') keys.d = false;
  });
  
  document.getElementById('closeBattleBtn').onclick = () => runFromBattle();
  
  // ============================================================
  // ROUND RECT UTILITY
  // ============================================================
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    return this;
  };
  
  // ============================================================
  // ANIMATION LOOP
  // ============================================================
  function animate() {
    if (!inBattle) {
      updateMovement();
      updateClickMovement();
    }
    
    ctx.clearRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);
    
    // Draw background gradient
    const grad = ctx.createLinearGradient(0, 0, 0, VIEW_HEIGHT);
    grad.addColorStop(0, '#87CEEB');
    grad.addColorStop(1, '#c8e6f5');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);
    
    drawGround();
    drawFlowers();
    drawTrees();
    
    for (const enemy of enemies) {
      drawEnemy(enemy);
    }
    
    drawPet();
    drawPlayer();
    
    requestAnimationFrame(animate);
  }
  
  // Initialize UI
  document.getElementById('petAttack').textContent = `${pet.attack}-${pet.attack + 4}`;
  document.getElementById('petMaxHp').textContent = pet.maxHp;
  animate();
</script>
