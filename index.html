<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fanter World - Prodigy x Pokemon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #0a0f1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Quicksand', 'Segoe UI', 'Poppins', sans-serif;
      overflow: hidden;
    }

    .game-container {
      position: relative;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      border: 3px solid #fbbf24;
    }

    canvas {
      display: block;
      margin: 0 auto;
      cursor: crosshair;
    }

    /* Prodigy-Style Top Bar */
    .prodigy-top-bar {
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 20;
      pointer-events: none;
    }

    .player-card {
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
      border-radius: 60px;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      border: 1px solid #fbbf24;
      pointer-events: auto;
    }

    .player-avatar {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      border: 2px solid #fbbf24;
    }

    .player-info h3 {
      color: white;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .player-info .xp-bar {
      width: 120px;
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      overflow: hidden;
    }

    .player-info .xp-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #fbbf24, #f59e0b);
      transition: width 0.3s;
    }

    .coin-display {
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
      border-radius: 60px;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid #fbbf24;
      color: #fbbf24;
      font-weight: bold;
    }

    /* Prodigy-Style Bottom Bar */
    .prodigy-bottom-bar {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(15px);
      border-radius: 60px;
      padding: 8px 20px;
      display: flex;
      gap: 15px;
      z-index: 20;
      border: 1px solid #fbbf24;
      pointer-events: auto;
    }

    .bottom-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 50px;
      padding: 10px 20px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .bottom-btn:hover {
      background: #3b82f6;
      transform: translateY(-3px);
    }

    .bottom-btn.pet-btn {
      background: linear-gradient(135deg, #a855f7, #7e22ce);
    }

    /* Pokemon-Style Battle Screen */
    .battle-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a3a2a, #0d1f15);
      z-index: 100;
      display: none;
      flex-direction: column;
      font-family: 'Quicksand', sans-serif;
    }

    .battle-screen.active {
      display: flex;
    }

    .battle-top {
      flex: 1;
      display: flex;
      justify-content: space-between;
      padding: 30px 50px;
    }

    .battle-card {
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 15px 25px;
      min-width: 220px;
      border: 2px solid;
    }

    .battle-card.enemy {
      border-color: #ef4444;
    }
    .battle-card.player {
      border-color: #22c55e;
    }

    .battle-card-name {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .battle-card.enemy .battle-card-name { color: #f87171; }
    .battle-card.player .battle-card-name { color: #4ade80; }

    .battle-hp-text {
      font-size: 13px;
      color: #ddd;
      margin-bottom: 5px;
    }
    .battle-hp-bar-bg {
      width: 180px;
      height: 12px;
      background: #333;
      border-radius: 10px;
      overflow: hidden;
    }
    .battle-hp-fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      width: 100%;
      transition: width 0.3s;
    }

    .battle-sprites {
      flex: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 150px;
    }

    .battle-sprite {
      text-align: center;
    }

    .battle-sprite canvas {
      width: 200px;
      height: 200px;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
    }

    .battle-sprite-name {
      margin-top: 10px;
      color: white;
      font-weight: bold;
    }

    .battle-bottom {
      background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
      border-top: 3px solid #fbbf24;
      padding: 20px 40px;
    }

    .battle-math-box {
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
      padding: 15px 25px;
      text-align: center;
      margin-bottom: 15px;
    }

    .battle-question {
      font-size: 32px;
      font-weight: bold;
      color: #fbbf24;
      margin-bottom: 15px;
    }

    .battle-options {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .battle-option-btn {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border: none;
      border-radius: 50px;
      padding: 10px 25px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
    }

    .battle-option-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #3b82f6;
    }

    .battle-message-area {
      background: rgba(0,0,0,0.7);
      border-radius: 15px;
      padding: 12px 20px;
      margin-top: 15px;
      text-align: center;
      color: #fbbf24;
      font-size: 14px;
    }

    .run-battle-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      margin-top: 10px;
      padding: 8px 20px;
      font-size: 14px;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    @keyframes flash {
      0%,100% { filter: brightness(1); }
      50% { filter: brightness(1.5) drop-shadow(0 0 10px red); }
    }
    .shake { animation: shake 0.3s ease-in-out; }
    .flash { animation: flash 0.3s ease-in-out; }
  </style>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="1400" height="800"></canvas>

  <!-- Prodigy-Style Top Bar -->
  <div class="prodigy-top-bar">
    <div class="player-card">
      <div class="player-avatar">⚔️</div>
      <div class="player-info">
        <h3>Fanter <span id="playerLevelBadge">Lv 1</span></h3>
        <div class="xp-bar"><div class="xp-fill" id="topXpFill" style="width:0%"></div></div>
        <span style="font-size:10px;color:#aaa;"><span id="topXp">0</span>/<span id="topXpNeeded">100</span> XP</span>
      </div>
    </div>
    <div class="coin-display">
      🪙 <span id="topCoins">0</span>
    </div>
  </div>

  <!-- Prodigy-Style Bottom Bar -->
  <div class="prodigy-bottom-bar">
    <button class="bottom-btn" id="teamBtn">🐱 Team</button>
    <button class="bottom-btn" id="bagBtn">🎒 Bag</button>
    <button class="bottom-btn pet-btn" id="petDetailsBtn">⭐ Mewt</button>
    <button class="bottom-btn" id="settingsBottomBtn">⚙️ Settings</button>
  </div>

  <!-- Pokemon-Style Battle Screen -->
  <div class="battle-screen" id="battleScreen">
    <div class="battle-top">
      <div class="battle-card enemy">
        <div class="battle-card-name" id="battleEnemyName">Wild Slime</div>
        <div class="battle-hp-text">❤️ <span id="battleEnemyHp">0</span>/<span id="battleEnemyMaxHp">0</span></div>
        <div class="battle-hp-bar-bg"><div class="battle-hp-fill" id="battleEnemyHpFill" style="width:100%"></div></div>
      </div>
      <div class="battle-card player">
        <div class="battle-card-name">🐱 Mewt</div>
        <div class="battle-hp-text">❤️ <span id="battlePetHp">0</span>/<span id="battlePetMaxHp">0</span></div>
        <div class="battle-hp-bar-bg"><div class="battle-hp-fill" id="battlePetHpFill" style="width:100%"></div></div>
      </div>
    </div>

    <div class="battle-sprites">
      <div class="battle-sprite">
        <canvas id="battleEnemyCanvas" width="200" height="200"></canvas>
        <div class="battle-sprite-name" id="battleEnemySpriteName">???</div>
      </div>
      <div class="battle-sprite">
        <canvas id="battlePetCanvas" width="200" height="200"></canvas>
        <div class="battle-sprite-name">Mewt Lv <span id="battlePetLevel">1</span></div>
      </div>
    </div>

    <div class="battle-bottom">
      <div class="battle-math-box">
        <div class="battle-question" id="battleQuestion">2 + 2 = ?</div>
        <div class="battle-options" id="battleOptions"></div>
      </div>
      <div class="battle-message-area" id="battleMessage">
        A wild enemy appeared! Answer correctly to attack!
      </div>
      <button class="battle-option-btn run-battle-btn" id="battleRunBtn">🏃 Run Away</button>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // FANTER WORLD - PRODIGY x POKEMON STYLE
  // ============================================================
  
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  
  // Battle canvases
  const battleEnemyCanvas = document.getElementById('battleEnemyCanvas');
  const battleEnemyCtx = battleEnemyCanvas.getContext('2d');
  const battlePetCanvas = document.getElementById('battlePetCanvas');
  const battlePetCtx = battlePetCanvas.getContext('2d');
  
  // ============================================================
  // WORLD SETUP - Unique terrain with Perlin-like variation
  // ============================================================
  const WORLD_WIDTH = 3500;
  const WORLD_HEIGHT = 3500;
  const VIEW_WIDTH = 1400;
  const VIEW_HEIGHT = 800;
  
  let cameraX = WORLD_WIDTH / 2 - VIEW_WIDTH / 2;
  let cameraY = WORLD_HEIGHT / 2 - VIEW_HEIGHT / 2;
  
  // Generate unique terrain using sine/cosine waves for natural look
  const terrainMap = [];
  for (let i = 0; i < 150; i++) {
    terrainMap[i] = [];
    for (let j = 0; j < 150; j++) {
      let height = 0;
      height += Math.sin(i * 0.08) * Math.cos(j * 0.08) * 2;
      height += Math.sin(i * 0.3 + 1.2) * 0.8;
      height += Math.cos(j * 0.25 + 0.7) * 0.8;
      height += Math.sin(i * 0.5 + j * 0.3) * 0.5;
      height = Math.max(0, Math.min(4, Math.floor(height + 2.5)));
      terrainMap[i][j] = height;
    }
  }
  
  const terrainColors = {
    0: '#3b5e2b', // dark grass
    1: '#4a7c3f', // normal grass
    2: '#5a9e4b', // light grass
    3: '#6bae57', // bright grass
    4: '#7bc967'  // vibrant grass
  };
  
  // Unique trees with different shapes
  const trees = [];
  const treeTypes = ['oak', 'pine', 'cherry', 'maple'];
  for (let i = 0; i < 150; i++) {
    trees.push({
      x: 200 + Math.random() * (WORLD_WIDTH - 400),
      y: 200 + Math.random() * (WORLD_HEIGHT - 400),
      type: treeTypes[Math.floor(Math.random() * treeTypes.length)],
      size: 25 + Math.random() * 15
    });
  }
  
  // Unique flowers/bushes
  const flora = [];
  const floraTypes = ['flower_red', 'flower_yellow', 'flower_purple', 'bush', 'mushroom'];
  for (let i = 0; i < 400; i++) {
    flora.push({
      x: Math.random() * WORLD_WIDTH,
      y: Math.random() * WORLD_HEIGHT,
      type: floraTypes[Math.floor(Math.random() * floraTypes.length)]
    });
  }
  
  // Rocks
  const rocks = [];
  for (let i = 0; i < 80; i++) {
    rocks.push({
      x: Math.random() * WORLD_WIDTH,
      y: Math.random() * WORLD_HEIGHT,
      size: 12 + Math.random() * 8
    });
  }
  
  // Enemies with unique appearances
  const enemies = [
    { x: 800, y: 600, name: 'Slime', hp: 28, maxHp: 28, attack: 7, defense: 3, exp: 30, color: '#86efac', type: 'slime', level: 2, pattern: 'bouncy' },
    { x: 1800, y: 1000, name: 'Glimmer', hp: 35, maxHp: 35, attack: 9, defense: 4, exp: 45, color: '#fbbf24', type: 'glimmer', level: 3, pattern: 'sparkle' },
    { x: 2500, y: 1500, name: 'Shadowpaw', hp: 42, maxHp: 42, attack: 11, defense: 5, exp: 60, color: '#a855f7', type: 'shadow', level: 4, pattern: 'furry' },
    { x: 1200, y: 2600, name: 'Frostbite', hp: 32, maxHp: 32, attack: 8, defense: 6, exp: 40, color: '#06b6d4', type: 'frost', level: 3, pattern: 'icy' },
    { x: 2900, y: 2200, name: 'Emberfang', hp: 48, maxHp: 48, attack: 13, defense: 4, exp: 75, color: '#f97316', type: 'ember', level: 5, pattern: 'fiery' },
    { x: 500, y: 3000, name: 'Leafpuff', hp: 30, maxHp: 30, attack: 6, defense: 7, exp: 35, color: '#4ade80', type: 'leaf', level: 2, pattern: 'leafy' },
    { x: 3200, y: 800, name: 'Thunderpaw', hp: 38, maxHp: 38, attack: 10, defense: 4, exp: 55, color: '#facc15', type: 'thunder', level: 4, pattern: 'electric' },
  ];
  
  // ============================================================
  // PLAYER & PET
  // ============================================================
  const player = {
    x: WORLD_WIDTH / 2,
    y: WORLD_HEIGHT / 2,
    targetX: WORLD_WIDTH / 2,
    targetY: WORLD_HEIGHT / 2,
    speed: 3.5,
    direction: 'down',
    walkCycle: 0,
    walkPhase: 0,
    level: 1,
    xp: 0,
    xpNeeded: 100,
    coins: 150
  };
  
  const pet = {
    x: WORLD_WIDTH / 2 - 50,
    y: WORLD_HEIGHT / 2,
    hp: 38,
    maxHp: 38,
    attack: 12,
    defense: 7,
    level: 1,
    exp: 0,
    walkPhase: 0
  };
  
  // Battle state
  let inBattle = false;
  let currentEnemy = null;
  let battlePetHp = pet.hp;
  let battleEnemyHp = 0;
  let currentQuestion = null;
  let battleAnimating = false;
  let battleMessage = '';
  
  // Movement flags
  const keys = { w: false, s: false, a: false, d: false };
  
  // Math questions (Kindergarten level)
  const mathQuestions = [
    { question: "1 + 1 = ?", answer: 2, options: [0, 1, 2, 3] },
    { question: "2 + 2 = ?", answer: 4, options: [2, 3, 4, 5] },
    { question: "3 + 1 = ?", answer: 4, options: [2, 3, 4, 5] },
    { question: "5 - 2 = ?", answer: 3, options: [1, 2, 3, 4] },
    { question: "2 + 3 = ?", answer: 5, options: [3, 4, 5, 6] },
    { question: "4 - 1 = ?", answer: 3, options: [1, 2, 3, 4] },
    { question: "1 + 0 = ?", answer: 1, options: [0, 1, 2, 3] },
    { question: "3 - 1 = ?", answer: 2, options: [1, 2, 3, 4] },
    { question: "2 + 4 = ?", answer: 6, options: [4, 5, 6, 7] },
    { question: "5 - 3 = ?", answer: 2, options: [1, 2, 3, 4] },
    { question: "What is 10 - 5?", answer: 5, options: [3, 4, 5, 6] },
    { question: "3 + 3 = ?", answer: 6, options: [4, 5, 6, 7] },
    { question: "4 + 4 = ?", answer: 8, options: [6, 7, 8, 9] },
    { question: "2 + 5 = ?", answer: 7, options: [5, 6, 7, 8] },
    { question: "9 - 3 = ?", answer: 6, options: [4, 5, 6, 7] },
  ];
  
  function getRandomQuestion() {
    return { ...mathQuestions[Math.floor(Math.random() * mathQuestions.length)] };
  }
  
  // ============================================================
  // DRAW UNIQUE TERRAIN (No repeating patterns)
  // ============================================================
  function drawTerrain() {
    const startX = Math.max(0, Math.floor(cameraX / 25));
    const endX = Math.min(149, Math.ceil((cameraX + VIEW_WIDTH) / 25));
    const startY = Math.max(0, Math.floor(cameraY / 25));
    const endY = Math.min(149, Math.ceil((cameraY + VIEW_HEIGHT) / 25));
    
    for (let i = startX; i < endX; i++) {
      for (let j = startY; j < endY; j++) {
        const x = i * 25 - cameraX;
        const y = j * 25 - cameraY;
        const terrainType = terrainMap[i]?.[j] || 2;
        ctx.fillStyle = terrainColors[terrainType];
        ctx.fillRect(x, y, 27, 27);
        
        // Add unique detail based on position
        if ((i * j) % 7 === 0) {
          ctx.fillStyle = 'rgba(0,0,0,0.05)';
          ctx.fillRect(x + 5, y + 5, 5, 5);
          ctx.fillRect(x + 15, y + 15, 5, 5);
        }
      }
    }
  }
  
  function drawUniqueTrees() {
    for (const tree of trees) {
      const x = tree.x - cameraX;
      const y = tree.y - cameraY;
      if (x + 45 < 0 || x - 45 > VIEW_WIDTH || y + 55 < 0 || y - 55 > VIEW_HEIGHT) continue;
      
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath();
      ctx.ellipse(x + 3, y + 28, 18, 7, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Trunk
      ctx.fillStyle = '#8B5A2B';
      ctx.fillRect(x - 6, y + 8, 12, 25);
      
      // Different tree shapes
      if (tree.type === 'oak') {
        ctx.fillStyle = '#2d6e2d';
        ctx.beginPath();
        ctx.ellipse(x, y - 2, 18, 22, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#3a8c3a';
        ctx.beginPath();
        ctx.ellipse(x - 6, y - 10, 13, 16, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(x + 6, y - 10, 13, 16, 0, 0, Math.PI * 2);
        ctx.fill();
      } else if (tree.type === 'pine') {
        ctx.fillStyle = '#1a5a1a';
        ctx.beginPath();
        ctx.moveTo(x, y - 25);
        ctx.lineTo(x - 12, y - 5);
        ctx.lineTo(x - 6, y - 5);
        ctx.lineTo(x - 6, y + 5);
        ctx.lineTo(x + 6, y + 5);
        ctx.lineTo(x + 6, y - 5);
        ctx.lineTo(x + 12, y - 5);
        ctx.fill();
      } else if (tree.type === 'cherry') {
        ctx.fillStyle = '#4a7c3f';
        ctx.beginPath();
        ctx.ellipse(x, y - 2, 16, 20, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#f472b6';
        ctx.beginPath();
        ctx.ellipse(x - 4, y - 12, 5, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(x + 4, y - 12, 5, 5, 0, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillStyle = '#3a7a3a';
        ctx.beginPath();
        ctx.ellipse(x, y - 2, 15, 18, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#f59e0b';
        ctx.beginPath();
        ctx.ellipse(x, y - 8, 6, 6, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
  
  function drawFlora() {
    for (const f of flora) {
      const x = f.x - cameraX;
      const y = f.y - cameraY;
      if (x + 12 < 0 || x - 12 > VIEW_WIDTH || y + 12 < 0 || y - 12 > VIEW_HEIGHT) continue;
      
      if (f.type === 'flower_red') {
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.ellipse(x, y, 3, 3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fbbf24';
        ctx.beginPath();
        ctx.ellipse(x, y, 1.5, 1.5, 0, 0, Math.PI * 2);
        ctx.fill();
      } else if (f.type === 'flower_yellow') {
        ctx.fillStyle = '#fbbf24';
        ctx.beginPath();
        ctx.ellipse(x, y, 3, 3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.ellipse(x, y, 1.5, 1.5, 0, 0, Math.PI * 2);
        ctx.fill();
      } else if (f.type === 'flower_purple') {
        ctx.fillStyle = '#a855f7';
        ctx.beginPath();
        ctx.ellipse(x, y, 3, 3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fbbf24';
        ctx.beginPath();
        ctx.ellipse(x, y, 1.5, 1.5, 0, 0, Math.PI * 2);
        ctx.fill();
      } else if (f.type === 'bush') {
        ctx.fillStyle = '#2d6e2d';
        ctx.beginPath();
        ctx.ellipse(x, y, 8, 6, 0, 0, Math.PI * 2);
        ctx.fill();
      } else if (f.type === 'mushroom') {
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(x - 2, y - 3, 4, 6);
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(x, y - 4, 4, 3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ef4444';
        ctx.fillRect(x - 1, y - 5, 2, 2);
      }
    }
  }
  
  function drawRocks() {
    for (const rock of rocks) {
      const x = rock.x - cameraX;
      const y = rock.y - cameraY;

  // ============================================================
  // COLLISION & MOVEMENT
  // ============================================================
  
  function isColliding(x, y, radius) {
    for (const tree of trees) {
      const dx = x - tree.x;
      const dy = y - tree.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < radius + tree.size / 1.5) return true;
    }
    for (const rock of rocks) {
      const dx = x - rock.x;
      const dy = y - rock.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < radius + rock.size / 1.5) return true;
    }
    for (const enemy of enemies) {
      const dx = x - enemy.x;
      const dy = y - enemy.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < radius + 30 && !inBattle) {
        startBattle(enemy);
        return true;
      }
    }
    if (x - radius < 0) return true;
    if (x + radius > WORLD_WIDTH) return true;
    if (y - radius < 0) return true;
    if (y + radius > WORLD_HEIGHT) return true;
    return false;
  }
  
  function updateMovement() {
    if (inBattle) return;
    
    let moveX = 0, moveY = 0;
    if (keys.w) moveY -= 1;
    if (keys.s) moveY += 1;
    if (keys.a) moveX -= 1;
    if (keys.d) moveX += 1;
    
    if (moveX !== 0 || moveY !== 0) {
      const len = Math.hypot(moveX, moveY);
      moveX /= len;
      moveY /= len;
      
      let newX = player.x + moveX * player.speed;
      let newY = player.y + moveY * player.speed;
      
      if (!isColliding(newX, player.y, 18)) player.x = newX;
      if (!isColliding(player.x, newY, 18)) player.y = newY;
      
      if (Math.abs(moveX) > Math.abs(moveY)) {
        player.direction = moveX > 0 ? 'right' : 'left';
      } else {
        player.direction = moveY > 0 ? 'down' : 'up';
      }
      
      player.walkCycle += 0.15;
    } else {
      player.walkCycle = 0;
    }
    
    // Pet follow
    const angle = Math.atan2(player.y - pet.y, player.x - pet.x);
    pet.x += Math.cos(angle) * 2.8;
    pet.y += Math.sin(angle) * 2.8;
    
    // Update pet walk phase
    pet.walkPhase += 0.1;
    
    // Camera follow
    cameraX = player.x - VIEW_WIDTH / 2;
    cameraY = player.y - VIEW_HEIGHT / 2;
    cameraX = Math.max(0, Math.min(cameraX, WORLD_WIDTH - VIEW_WIDTH));
    cameraY = Math.max(0, Math.min(cameraY, WORLD_HEIGHT - VIEW_HEIGHT));
  }
  
  function updateClickMovement() {
    if (inBattle) return;
    const dx = player.targetX - player.x;
    const dy = player.targetY - player.y;
    const dist = Math.hypot(dx, dy);
    
    if (dist > 3) {
      const moveX = (dx / dist) * player.speed;
      const moveY = (dy / dist) * player.speed;
      
      let newX = player.x + moveX;
      let newY = player.y + moveY;
      
      if (!isColliding(newX, player.y, 18)) player.x = newX;
      if (!isColliding(player.x, newY, 18)) player.y = newY;
      
      if (Math.abs(moveX) > Math.abs(moveY)) {
        player.direction = moveX > 0 ? 'right' : 'left';
      } else if (Math.abs(moveY) > 0) {
        player.direction = moveY > 0 ? 'down' : 'up';
      }
      
      player.walkCycle += 0.15;
    } else {
      player.walkCycle = 0;
    }
  }
  
  // ============================================================
  // BATTLE SYSTEM (Pokemon Style with Math)
  // ============================================================
  
  function startBattle(enemy) {
    if (inBattle) return;
    inBattle = true;
    currentEnemy = { ...enemy };
    battleEnemyHp = currentEnemy.hp;
    battlePetHp = pet.hp;
    currentQuestion = getRandomQuestion();
    battleMessage = `A wild ${currentEnemy.name} appeared! Answer correctly to attack!`;
    
    // Update battle UI
    document.getElementById('battleEnemyName').textContent = currentEnemy.name;
    document.getElementById('battleEnemyHp').textContent = battleEnemyHp;
    document.getElementById('battleEnemyMaxHp').textContent = currentEnemy.maxHp;
    document.getElementById('battlePetHp').textContent = battlePetHp;
    document.getElementById('battlePetMaxHp').textContent = pet.maxHp;
    document.getElementById('battlePetLevel').textContent = pet.level;
    document.getElementById('battleEnemySpriteName').textContent = currentEnemy.name;
    document.getElementById('battleQuestion').textContent = currentQuestion.question;
    document.getElementById('battleMessage').textContent = battleMessage;
    
    updateBattleHpBars();
    drawBattleEnemySprite(battleEnemyCtx, currentEnemy);
    drawBattlePetSprite(battlePetCtx);
    renderBattleOptions();
    
    document.getElementById('battleScreen').classList.add('active');
  }
  
  function renderBattleOptions() {
    const container = document.getElementById('battleOptions');
    container.innerHTML = '';
    currentQuestion.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'battle-option-btn';
      btn.textContent = opt;
      btn.onclick = () => handleBattleAnswer(opt);
      container.appendChild(btn);
    });
  }
  
  function updateBattleHpBars() {
    const enemyPercent = (battleEnemyHp / currentEnemy.maxHp) * 100;
    const petPercent = (battlePetHp / pet.maxHp) * 100;
    document.getElementById('battleEnemyHpFill').style.width = `${Math.max(0, enemyPercent)}%`;
    document.getElementById('battlePetHpFill').style.width = `${Math.max(0, petPercent)}%`;
    document.getElementById('battleEnemyHp').textContent = Math.max(0, battleEnemyHp);
    document.getElementById('battlePetHp').textContent = Math.max(0, battlePetHp);
  }
  
  async function handleBattleAnswer(answer) {
    if (battleAnimating || !inBattle) return;
    battleAnimating = true;
    
    // Shake and flash animation
    const enemySprite = document.getElementById('battleEnemyCanvas');
    enemySprite.classList.add('shake', 'flash');
    setTimeout(() => {
      enemySprite.classList.remove('shake', 'flash');
    }, 300);
    
    if (answer === currentQuestion.answer) {
      const damage = Math.floor(Math.random() * 12) + 10;
      battleEnemyHp -= damage;
      battleMessage = `Correct! Mewt dealt ${damage} damage!`;
      document.getElementById('battleMessage').textContent = battleMessage;
      updateBattleHpBars();
      
      if (battleEnemyHp <= 0) {
        setTimeout(() => winBattle(), 800);
        battleAnimating = false;
        return;
      }
      
      // Enemy turn after delay
      setTimeout(() => enemyTurn(), 1000);
    } else {
      battleMessage = `Wrong! The answer was ${currentQuestion.answer}. ${currentEnemy.name} attacked!`;
      document.getElementById('battleMessage').textContent = battleMessage;
      
      const damage = Math.floor(Math.random() * currentEnemy.attack) + 5;
      const reducedDamage = Math.max(1, damage - Math.floor(pet.defense / 3));
      battlePetHp -= reducedDamage;
      updateBattleHpBars();
      
      const petSprite = document.getElementById('battlePetCanvas');
      petSprite.classList.add('shake', 'flash');
      setTimeout(() => {
        petSprite.classList.remove('shake', 'flash');
      }, 300);
      
      if (battlePetHp <= 0) {
        setTimeout(() => loseBattle(), 800);
        battleAnimating = false;
        return;
      }
      
      battleMessage = `What will Mewt do?`;
      document.getElementById('battleMessage').textContent = battleMessage;
      currentQuestion = getRandomQuestion();
      document.getElementById('battleQuestion').textContent = currentQuestion.question;
      renderBattleOptions();
    }
    
    battleAnimating = false;
  }
  
  function enemyTurn() {
    if (!inBattle || battleEnemyHp <= 0) return;
    
    const damage = Math.floor(Math.random() * currentEnemy.attack) + 5;
    const reducedDamage = Math.max(1, damage - Math.floor(pet.defense / 3));
    battlePetHp -= reducedDamage;
    battleMessage = `${currentEnemy.name} attacked! It dealt ${reducedDamage} damage!`;
    document.getElementById('battleMessage').textContent = battleMessage;
    updateBattleHpBars();
    
    const petSprite = document.getElementById('battlePetCanvas');
    petSprite.classList.add('shake', 'flash');
    setTimeout(() => {
      petSprite.classList.remove('shake', 'flash');
    }, 300);
    
    if (battlePetHp <= 0) {
      setTimeout(() => loseBattle(), 800);
      return;
    }
    
    battleMessage = `What will Mewt do?`;
    document.getElementById('battleMessage').textContent = battleMessage;
    currentQuestion = getRandomQuestion();
    document.getElementById('battleQuestion').textContent = currentQuestion.question;
    renderBattleOptions();
  }
  
  function winBattle() {
    const expGain = currentEnemy.exp;
    battleMessage = `Victory! Mewt gained ${expGain} XP!`;
    document.getElementById('battleMessage').textContent = battleMessage;
    
    // Grant XP
    player.xp += expGain;
    pet.exp += expGain;
    
    // Add coins
    const coinGain = 25 + Math.floor(Math.random() * 25);
    player.coins += coinGain;
    battleMessage += ` +${coinGain} coins!`;
    document.getElementById('battleMessage').textContent = battleMessage;
    updateUI();
    
    // Level up check
    if (player.xp >= player.xpNeeded) {
      player.level++;
      player.xp -= player.xpNeeded;
      player.xpNeeded = Math.floor(player.xpNeeded * 1.4);
      pet.level++;
      pet.maxHp += 8;
      pet.hp = pet.maxHp;
      pet.attack += 3;
      pet.defense += 2;
      battlePetHp = pet.hp;
      battleMessage += ` 🌟 Mewt grew to Level ${pet.level}! 🌟`;
      document.getElementById('battleMessage').textContent = battleMessage;
      updateUI();
    }
    
    // Heal pet
    pet.hp = Math.min(pet.hp + Math.floor(pet.maxHp * 0.3), pet.maxHp);
    battlePetHp = pet.hp;
    
    // Remove defeated enemy
    const index = enemies.findIndex(e => e.x === currentEnemy.x && e.y === currentEnemy.y);
    if (index !== -1) enemies.splice(index, 1);
    
    updateBattleHpBars();
    updateUI();
    
    setTimeout(() => {
      document.getElementById('battleScreen').classList.remove('active');
      inBattle = false;
      currentEnemy = null;
      battleAnimating = false;
    }, 2500);
  }
  
  function loseBattle() {
    battleMessage = `Mewt fainted... Running away to heal!`;
    document.getElementById('battleMessage').textContent = battleMessage;
    
    pet.hp = pet.maxHp;
    battlePetHp = pet.hp;
    updateUI();
    updateBattleHpBars();
    
    setTimeout(() => {
      document.getElementById('battleScreen').classList.remove('active');
      inBattle = false;
      currentEnemy = null;
      battleAnimating = false;
    }, 2000);
  }
  
  function runFromBattle() {
    battleMessage = `Got away safely!`;
    document.getElementById('battleMessage').textContent = battleMessage;
    setTimeout(() => {
      document.getElementById('battleScreen').classList.remove('active');
      inBattle = false;
      currentEnemy = null;
      battleAnimating = false;
    }, 800);
  }
  
  // ============================================================
  // UI UPDATES
  // ============================================================
  
  function updateUI() {
    const xpPercent = (player.xp / player.xpNeeded) * 100;
    document.getElementById('topXpFill').style.width = `${Math.min(100, xpPercent)}%`;
    document.getElementById('topXp').textContent = player.xp;
    document.getElementById('topXpNeeded').textContent = player.xpNeeded;
    document.getElementById('playerLevelBadge').textContent = `Lv ${player.level}`;
    document.getElementById('topCoins').textContent = player.coins;
    document.getElementById('petHp').textContent = Math.floor(pet.hp);
    document.getElementById('petMaxHp').textContent = pet.maxHp;
    document.getElementById('petAttack').textContent = `${pet.attack}-${pet.attack + 4}`;
    document.getElementById('petDefense').textContent = pet.defense;
  }
  
  // ============================================================
  // EVENT HANDLERS
  // ============================================================
  
  canvas.addEventListener('click', (e) => {
    if (inBattle) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mouseX = (e.clientX - rect.left) * scaleX;
    const mouseY = (e.clientY - rect.top) * scaleY;
    player.targetX = cameraX + mouseX;
    player.targetY = cameraY + mouseY;
  });
  
  document.addEventListener('keydown', (e) => {
    if (inBattle) return;
    const key = e.key.toLowerCase();
    if (key === 'w') keys.w = true;
    if (key === 's') keys.s = true;
    if (key === 'a') keys.a = true;
    if (key === 'd') keys.d = true;
    if (['w', 's', 'a', 'd'].includes(key)) {
      player.targetX = player.x;
      player.targetY = player.y;
    }
  });
  
  document.addEventListener('keyup', (e) => {
    const key = e.key.toLowerCase();
    if (key === 'w') keys.w = false;
    if (key === 's') keys.s = false;
    if (key === 'a') keys.a = false;
    if (key === 'd') keys.d = false;
  });
  
  document.getElementById('battleRunBtn').onclick = () => runFromBattle();
  
  // Bottom bar buttons
  document.getElementById('teamBtn').onclick = () => alert('🐱 Mewt - Level ' + pet.level + '\n❤️ HP: ' + pet.hp + '/' + pet.maxHp + '\n⚔️ Attack: ' + pet.attack + '\n🛡️ Defense: ' + pet.defense);
  document.getElementById('bagBtn').onclick = () => alert('🎒 Your bag:\n🪙 ' + player.coins + ' coins\n⭐ ' + player.xp + ' XP');
  document.getElementById('petDetailsBtn').onclick = () => alert('⭐ Mewt - Your loyal companion!\nLevel: ' + pet.level + '\nHP: ' + pet.hp + '/' + pet.maxHp + '\nAttack: ' + pet.attack + '\nDefense: ' + pet.defense);
  document.getElementById('settingsBottomBtn').onclick = () => alert('⚙️ Settings\n\nWASD or Click to move\nTouch enemies to battle!\nAnswer math questions to attack!');
  
  // ============================================================
  // ANIMATION LOOP
  // ============================================================
  
  function animate() {
    if (!inBattle) {
      updateMovement();
      updateClickMovement();
    }
    
    // Sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, VIEW_HEIGHT);
    grad.addColorStop(0, '#7dd3fc');
    grad.addColorStop(1, '#bae6fd');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, VIEW_WIDTH, VIEW_HEIGHT);
    
    drawTerrain();
    drawFlora();
    drawRocks();
    drawUniqueTrees();
    
    for (const enemy of enemies) {
      drawMapEnemy(enemy);
    }
    
    drawPetWithWalk();
    drawPlayerWithWalk();
    
    requestAnimationFrame(animate);
  }
  
  updateUI();
  animate();
</script>
</body>
</html>
