<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fanter World | Prodigy x Pokemon RPG</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: linear-gradient(135deg, #0a0f1a, #0d1525);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', 'Press Start 2P', 'Segoe UI', monospace;
      overflow: hidden;
    }

    .game-wrapper {
      position: relative;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      border: 3px solid #fbbf24;
    }

    canvas {
      display: block;
      cursor: crosshair;
      border-radius: 20px;
    }

    /* UI Panels - Prodigy Style */
    .top-ui {
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      display: flex;
      justify-content: space-between;
      z-index: 20;
      pointer-events: none;
    }

    .player-card {
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      border: 2px solid #fbbf24;
      pointer-events: auto;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    .player-icon {
      width: 45px;
      height: 45px;
      background: linear-gradient(135deg, #3b82f6, #1e3a8a);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      border: 2px solid #fbbf24;
      box-shadow: 0 0 10px rgba(59,130,246,0.5);
    }

    .player-stats h4 {
      color: #fbbf24;
      font-size: 12px;
      margin-bottom: 5px;
      letter-spacing: 1px;
    }

    .xp-bar-bg {
      width: 140px;
      height: 8px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      overflow: hidden;
    }

    .xp-bar-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #fbbf24, #f59e0b);
      transition: width 0.3s;
      border-radius: 10px;
    }

    .coin-card {
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 10px 25px;
      border: 2px solid #fbbf24;
      color: #fbbf24;
      font-weight: bold;
      font-size: 18px;
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bottom-ui {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      border-radius: 50px;
      padding: 8px 20px;
      display: flex;
      gap: 12px;
      z-index: 20;
      border: 2px solid #fbbf24;
      pointer-events: auto;
    }

    .ui-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 40px;
      padding: 8px 20px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      font-family: monospace;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .ui-btn:hover {
      background: #3b82f6;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(59,130,246,0.4);
    }

    .controls-hint {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 6px 15px;
      color: rgba(255,255,255,0.6);
      font-size: 10px;
      z-index: 20;
      pointer-events: none;
    }

    /* Battle Screen - Pokemon Style */
    .battle-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 30%, #0a2a1a, #051a0a);
      z-index: 100;
      display: none;
      flex-direction: column;
      font-family: monospace;
    }

    .battle-container.active {
      display: flex;
    }

    .battle-hud {
      display: flex;
      justify-content: space-between;
      padding: 25px 50px;
    }

    .battle-card {
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 12px 25px;
      min-width: 240px;
      border: 2px solid;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .battle-card.enemy { border-color: #ef4444; }
    .battle-card.player { border-color: #22c55e; }

    .battle-card-name {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .enemy .battle-card-name { color: #f87171; }
    .player .battle-card-name { color: #4ade80; }

    .battle-hp-bar-bg {
      width: 170px;
      height: 12px;
      background: #333;
      border-radius: 10px;
      overflow: hidden;
      margin: 5px 0;
    }
    .battle-hp-fill {
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #16a34a);
      width: 100%;
      transition: width 0.3s;
    }

    .battle-sprites-area {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 150px;
      position: relative;
    }

    .battle-sprite {
      text-align: center;
      filter: drop-shadow(0 15px 20px rgba(0,0,0,0.4));
    }

    .battle-sprite canvas {
      width: 200px;
      height: 200px;
    }

    .battle-sprite-name {
      margin-top: 10px;
      color: white;
      font-weight: bold;
      font-size: 14px;
    }

    .battle-controls {
      background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
      border-top: 3px solid #fbbf24;
      padding: 20px 40px;
    }

    .battle-math-area {
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
      padding: 15px;
      text-align: center;
      margin-bottom: 15px;
    }

    .battle-question {
      font-size: 28px;
      color: #fbbf24;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .battle-options {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .battle-opt-btn {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border: none;
      border-radius: 50px;
      padding: 10px 25px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      font-family: monospace;
      transition: all 0.2s;
    }

    .battle-opt-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #3b82f6;
    }

    .battle-message {
      background: rgba(0,0,0,0.7);
      border-radius: 15px;
      padding: 10px;
      text-align: center;
      margin-top: 12px;
      color: #fbbf24;
      font-size: 13px;
    }

    .battle-run {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      margin-top: 10px;
      width: 100%;
      padding: 10px;
    }

    @keyframes shakeAnim {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    @keyframes hitFlash {
      0%,100% { filter: brightness(1); }
      50% { filter: brightness(1.8) drop-shadow(0 0 10px red); }
    }
    @keyframes floatAnim {
      0%,100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }
    @keyframes walkLeg {
      0%,100% { transform: rotate(-8deg); }
      50% { transform: rotate(8deg); }
    }
    @keyframes sparkle {
      0%,100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
    }

    .shake-effect { animation: shakeAnim 0.3s ease-in-out; }
    .hit-effect { animation: hitFlash 0.3s ease-in-out; }
    .float-effect { animation: floatAnim 2s ease-in-out infinite; }
  </style>
</head>
<body>
<div class="game-wrapper">
  <canvas id="gameCanvas" width="1300" height="750"></canvas>

  <div class="top-ui">
    <div class="player-card">
      <div class="player-icon">⚔️</div>
      <div class="player-stats">
        <h4>FANTER <span id="playerLvBadge">Lv 1</span></h4>
        <div class="xp-bar-bg"><div class="xp-bar-fill" id="xpFillBar" style="width:0%"></div></div>
        <span style="font-size:9px;"><span id="xpCurrent">0</span>/<span id="xpNeeded">100</span> XP</span>
      </div>
    </div>
    <div class="coin-card">
      🪙 <span id="coinAmount">200</span>
    </div>
  </div>

  <div class="bottom-ui">
    <button class="ui-btn" id="teamBtn">🐱 TEAM</button>
    <button class="ui-btn" id="bagBtn">🎒 BAG</button>
    <button class="ui-btn" id="petInfoBtn">⭐ MEWT</button>
    <button class="ui-btn" id="settingsBtn">⚙️ SET</button>
  </div>

  <div class="controls-hint">
    🎮 WASD or Click to Move | 🐱 Pet Follows | ⚔️ Touch Enemy = Battle
  </div>

  <div class="battle-container" id="battleScreen">
    <div class="battle-hud">
      <div class="battle-card enemy">
        <div class="battle-card-name" id="battleEnemyName">SLIME</div>
        <div class="battle-hp-bar-bg"><div class="battle-hp-fill" id="battleEnemyFill" style="width:100%"></div></div>
        <div style="font-size:11px;">❤️ <span id="battleEnemyHp">0</span>/<span id="battleEnemyMax">0</span></div>
      </div>
      <div class="battle-card player">
        <div class="battle-card-name">🐱 MEWT</div>
        <div class="battle-hp-bar-bg"><div class="battle-hp-fill" id="battlePetFill" style="width:100%"></div></div>
        <div style="font-size:11px;">❤️ <span id="battlePetHp">0</span>/<span id="battlePetMax">0</span></div>
      </div>
    </div>

    <div class="battle-sprites-area">
      <div class="battle-sprite">
        <canvas id="enemyBattleCanvas" width="200" height="200"></canvas>
        <div class="battle-sprite-name" id="enemyNameTag">???</div>
      </div>
      <div class="battle-sprite">
        <canvas id="petBattleCanvas" width="200" height="200"></canvas>
        <div class="battle-sprite-name">MEWT Lv <span id="battlePetLv">1</span></div>
      </div>
    </div>

    <div class="battle-controls">
      <div class="battle-math-area">
        <div class="battle-question" id="battleQuestion">2 + 2 = ?</div>
        <div class="battle-options" id="battleOptions"></div>
      </div>
      <div class="battle-message" id="battleMessage">A wild enemy appeared!</div>
      <button class="battle-opt-btn battle-run" id="battleRunBtn">🏃 RUN</button>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // FANTER WORLD - BEAUTIFUL CODE-DRAWN GRAPHICS
  // ============================================================
  
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  
  const enemyBattleCanvas = document.getElementById('enemyBattleCanvas');
  const enemyBattleCtx = enemyBattleCanvas.getContext('2d');
  const petBattleCanvas = document.getElementById('petBattleCanvas');
  const petBattleCtx = petBattleCanvas.getContext('2d');
  
  // ============================================================
  // WORLD SETUP
  // ============================================================
  const WORLD_W = 3500;
  const WORLD_H = 3500;
  const VIEW_W = 1300;
  const VIEW_H = 750;
  const TILE_SIZE = 32;
  
  let camX = WORLD_W/2 - VIEW_W/2;
  let camY = WORLD_H/2 - VIEW_H/2;
  
  // Beautiful terrain generation
  const tileMap = [];
  for (let i = 0; i < 110; i++) {
    tileMap[i] = [];
    for (let j = 0; j < 110; j++) {
      const val = (i * 131 + j * 253) % 100;
      if (val < 40) tileMap[i][j] = 0;
      else if (val < 70) tileMap[i][j] = 1;
      else tileMap[i][j] = 2;
    }
  }
  
  const tileColors = ['#3a6b33', '#4a7c3f', '#5a9e4b'];
  const tileHighlights = ['#4a7c3f', '#5a9e4b', '#6aae5b'];
  
  // Trees with different styles
  const trees = [];
  for (let i = 0; i < 120; i++) {
    trees.push({
      x: 200 + Math.random() * (WORLD_W - 400),
      y: 200 + Math.random() * (WORLD_H - 400),
      type: Math.random() > 0.7 ? 'oak' : 'pine',
      size: 24
    });
  }
  
  // Flowers
  const flowers = [];
  for (let i = 0; i < 400; i++) {
    flowers.push({
      x: Math.random() * WORLD_W,
      y: Math.random() * WORLD_H,
      color: ['#f472b6', '#fbbf24', '#a855f7', '#60a5fa'][Math.floor(Math.random() * 4)]
    });
  }
  
  // Rocks
  const rocks = [];
  for (let i = 0; i < 80; i++) {
    rocks.push({
      x: Math.random() * WORLD_W,
      y: Math.random() * WORLD_H,
      size: 8 + Math.random() * 8
    });
  }
  
  // Enemies with unique designs
  const enemies = [
    { x: 900, y: 700, name: 'SLIME', hp: 32, maxHp: 32, atk: 7, def: 3, exp: 35, color: '#86efac', type: 'slime', level: 2 },
    { x: 1900, y: 1200, name: 'GLIMMER', hp: 40, maxHp: 40, atk: 9, def: 4, exp: 50, color: '#fbbf24', type: 'glimmer', level: 3 },
    { x: 2700, y: 1700, name: 'SHADOWPAW', hp: 48, maxHp: 48, atk: 12, def: 5, exp: 70, color: '#a855f7', type: 'shadow', level: 4 },
    { x: 1400, y: 2600, name: 'FROSTBITE', hp: 36, maxHp: 36, atk: 8, def: 6, exp: 45, color: '#06b6d4', type: 'frost', level: 3 },
    { x: 2900, y: 2400, name: 'EMBERFANG', hp: 52, maxHp: 52, atk: 14, def: 4, exp: 85, color: '#f97316', type: 'ember', level: 5 },
    { x: 500, y: 2900, name: 'LEAFPUFF', hp: 34, maxHp: 34, atk: 7, def: 7, exp: 40, color: '#4ade80', type: 'leaf', level: 2 },
  ];
  
  // ============================================================
  // PLAYER DATA (with save)
  // ============================================================
  let player = {
    x: WORLD_W/2,
    y: WORLD_H/2,
    targetX: WORLD_W/2,
    targetY: WORLD_H/2,
    speed: 3.3,
    walkCycle: 0,
    legSwing: 0,
    direction: 0,
    lv: 1,
    xp: 0,
    xpNeeded: 100,
    coins: 200
  };
  
  let pet = {
    x: player.x - 45,
    y: player.y,
    hp: 45,
    maxHp: 45,
    atk: 14,
    def: 8,
    lv: 1,
    tailSwing: 0,
    walkCycle: 0
  };
  
  // Load save
  const saved = localStorage.getItem('fanterWorld');
  if (saved) {
    try {
      const save = JSON.parse(saved);
      player.lv = save.lv || 1;
      player.xp = save.xp || 0;
      player.coins = save.coins || 200;
      pet.lv = save.petLv || 1;
      pet.hp = save.petHp || 45;
      pet.maxHp = save.petMaxHp || 45;
      pet.atk = save.petAtk || 14;
      pet.def = save.petDef || 8;
      player.xpNeeded = save.xpNeeded || 100;
    } catch(e) {}
  }
  
  function saveGame() {
    localStorage.setItem('fanterWorld', JSON.stringify({
      lv: player.lv,
      xp: player.xp,
      coins: player.coins,
      petLv: pet.lv,
      petHp: pet.hp,
      petMaxHp: pet.maxHp,
      petAtk: pet.atk,
      petDef: pet.def,
      xpNeeded: player.xpNeeded
    }));
  }
  
  // Battle state
  let inBattle = false;
  let currentEnemy = null;
  let battlePetHP = pet.hp;
  let battleEnemyHP = 0;
  let currentQuestion = null;
  let isAnimating = false;
  
  // Movement
  const keys = { w: false, s: false, a: false, d: false };
  
  // Math questions
  const mathBank = [
    { q: "1 + 1 = ?", a: 2, opts: [0,1,2,3] },
    { q: "2 + 2 = ?", a: 4, opts: [2,3,4,5] },
    { q: "3 + 1 = ?", a: 4, opts: [2,3,4,5] },
    { q: "5 - 2 = ?", a: 3, opts: [1,2,3,4] },
    { q: "2 + 3 = ?", a: 5, opts: [3,4,5,6] },
    { q: "4 - 1 = ?", a: 3, opts: [1,2,3,4] },
    { q: "1 + 0 = ?", a: 1, opts: [0,1,2,3] },
    { q: "3 - 1 = ?", a: 2, opts: [1,2,3,4] },
    { q: "2 + 4 = ?", a: 6, opts: [4,5,6,7] },
    { q: "5 - 3 = ?", a: 2, opts: [1,2,3,4] },
    { q: "10 - 5 = ?", a: 5, opts: [3,4,5,6] },
    { q: "3 + 3 = ?", a: 6, opts: [4,5,6,7] },
    { q: "4 + 4 = ?", a: 8, opts: [6,7,8,9] },
  ];
  
  function getRandomMath() {
    return { ...mathBank[Math.floor(Math.random() * mathBank.length)] };
  }
  
  // ============================================================
  // BEAUTIFUL DRAW FUNCTIONS
  // ============================================================
  
  function drawGround() {
    const startX = Math.max(0, Math.floor(camX / TILE_SIZE));
    const endX = Math.min(109, Math.ceil((camX + VIEW_W) / TILE_SIZE) + 1);
    const startY = Math.max(0, Math.floor(camY / TILE_SIZE));
    const endY = Math.min(109, Math.ceil((camY + VIEW_H) / TILE_SIZE) + 1);
    
    for (let i = startX; i < endX; i++) {
      for (let j = startY; j < endY; j++) {
        const x = i * TILE_SIZE - camX;
        const y = j * TILE_SIZE - camY;
        const tileType = tileMap[i]?.[j] || 0;
        
        // Base color
        ctx.fillStyle = tileColors[tileType];
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        
        // Add gradient highlight
        ctx.fillStyle = tileHighlights[tileType];
        ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, 4);
        
        // Subtle texture dots
        ctx.fillStyle = 'rgba(0,0,0,0.05)';
        for (let k = 0; k < 2; k++) {
          ctx.fillRect(x + 8 + (i * 7) % 16, y + 16 + (j * 11) % 16, 2, 2);
        }
        
        // Border
        ctx.strokeStyle = 'rgba(0,0,0,0.04)';
        ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
      }
    }
  }
  
  function drawFlowers() {
    for (const f of flowers) {
      const x = f.x - camX;
      const y = f.y - camY;
      if (x > -15 && x < VIEW_W + 15 && y > -15 && y < VIEW_H + 15) {
        // Stem
        ctx.fillStyle = '#4ade80';
        ctx.fillRect(x - 1, y + 2, 2, 6);
        // Flower petals
        ctx.fillStyle = f.color;
        ctx.beginPath();
        for (let a = 0; a < 5; a++) {
          const angle = a * 72 * Math.PI / 180;
          const px = x + Math.cos(angle) * 4;
          const py = y + Math.sin(angle) * 4;
          ctx.beginPath();
          ctx.ellipse(px, py, 2, 3, angle, 0, Math.PI * 2);
          ctx.fill();
        }
        // Center
        ctx.fillStyle = '#fbbf24';
        ctx.beginPath();
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
  
  function drawRocks() {
    for (const r of rocks) {
      const x = r.x - camX;
      const y = r.y - camY;
      if (x > -20 && x < VIEW_W + 20 && y > -20 && y < VIEW_H + 20) {
        ctx.fillStyle = '#78716c';
        ctx.beginPath();
        ctx.ellipse(x, y, r.size, r.size * 0.6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#a8a29e';
        ctx.beginPath();
        ctx.ellipse(x - 2, y - 2, r.size * 0.4, r.size * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
  
  function drawTrees() {
    for (const tree of trees) {
      const x = tree.x - camX;
      const y = tree.y - camY;
      if (x > -50 && x < VIEW_W + 50 && y > -60 && y < VIEW_H + 60) {
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.ellipse(x + 3, y + 28, 18, 7, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Trunk
        ctx.fillStyle = '#8B5A2B';
        ctx.fillRect(x - 6, y + 8, 12, 25);
        
        if (tree.type === 'oak') {
          // Oak tree - layered circles
          ctx.fillStyle = '#2d6e2d';
          ctx.beginPath();
          ctx.ellipse(x, y - 2, 18, 22, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#3a8c3a';
          ctx.beginPath();
          ctx.ellipse(x - 7, y - 10, 13, 16, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.ellipse(x + 7, y - 10, 13, 16, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#4ade80';
          ctx.beginPath();
          ctx.ellipse(x, y - 18, 8, 10, 0, 0, Math.PI * 2);
          ctx.fill();
        } else {
          // Pine tree - triangles
          ctx.fillStyle = '#1a5a1a';
          ctx.beginPath();
          ctx.moveTo(x, y - 28);
          ctx.lineTo(x - 12, y - 5);
          ctx.lineTo(x - 5, y - 5);
          ctx.lineTo(x - 5, y + 5);
          ctx.lineTo(x + 5, y + 5);
          ctx.lineTo(x + 5, y - 5);
          ctx.lineTo(x + 12, y - 5);
          ctx.fill();
        }
      }
    }
  }
  
  // Detailed Player Drawing
  function drawPlayer() {
    const x = player.x - camX;
    const y = player.y - camY;

  // ============================================================
  // MOVEMENT & COLLISION
  // ============================================================
  
  function checkCollision(x, y, r) {
    for (const t of trees) {
      if (Math.hypot(x - t.x, y - t.y) < r + 14) return true;
    }
    for (const rk of rocks) {
      if (Math.hypot(x - rk.x, y - rk.y) < r + rk.size/2) return true;
    }
    for (const e of enemies) {
      if (Math.hypot(x - e.x, y - e.y) < r + 18 && !inBattle) {
        startBattle(e);
        return true;
      }
    }
    if (x < r || x > WORLD_W - r) return true;
    if (y < r || y > WORLD_H - r) return true;
    return false;
  }
  
  function handleMovement() {
    if (inBattle) return;
    
    let mx = 0, my = 0;
    if (keys.w) my -= 1;
    if (keys.s) my += 1;
    if (keys.a) mx -= 1;
    if (keys.d) mx += 1;
    
    if (mx !== 0 || my !== 0) {
      const len = Math.hypot(mx, my);
      mx /= len;
      my /= len;
      
      let nx = player.x + mx * player.speed;
      let ny = player.y + my * player.speed;
      
      if (!checkCollision(nx, player.y, 17)) player.x = nx;
      if (!checkCollision(player.x, ny, 17)) player.y = ny;
      
      player.walkCycle += 0.16;
    } else {
      player.walkCycle = 0;
    }
    
    // Pet follows player
    const angle = Math.atan2(player.y - pet.y, player.x - pet.x);
    pet.x += Math.cos(angle) * 2.7;
    pet.y += Math.sin(angle) * 2.7;
    pet.walkCycle += 0.1;
    
    // Camera
    camX = player.x - VIEW_W/2;
    camY = player.y - VIEW_H/2;
    camX = Math.max(0, Math.min(camX, WORLD_W - VIEW_W));
    camY = Math.max(0, Math.min(camY, WORLD_H - VIEW_H));
  }
  
  function handleClickMove() {
    if (inBattle) return;
    const dx = player.targetX - player.x;
    const dy = player.targetY - player.y;
    const dist = Math.hypot(dx, dy);
    
    if (dist > 5) {
      const mx = (dx / dist) * player.speed;
      const my = (dy / dist) * player.speed;
      let nx = player.x + mx;
      let ny = player.y + my;
      if (!checkCollision(nx, player.y, 17)) player.x = nx;
      if (!checkCollision(player.x, ny, 17)) player.y = ny;
      player.walkCycle += 0.16;
    } else {
      player.walkCycle = 0;
    }
  }
  
  // ============================================================
  // BATTLE SYSTEM
  // ============================================================
  
  function startBattle(enemy) {
    if (inBattle) return;
    inBattle = true;
    currentEnemy = { ...enemy };
    battleEnemyHP = currentEnemy.hp;
    battlePetHP = pet.hp;
    currentQuestion = getRandomMath();
    
    document.getElementById('battleEnemyName').textContent = currentEnemy.name;
    document.getElementById('battleEnemyHp').textContent = battleEnemyHP;
    document.getElementById('battleEnemyMax').textContent = currentEnemy.maxHp;
    document.getElementById('battlePetHp').textContent = battlePetHP;
    document.getElementById('battlePetMax').textContent = pet.maxHp;
    document.getElementById('battlePetLv').textContent = pet.lv;
    document.getElementById('enemyNameTag').textContent = currentEnemy.name;
    document.getElementById('battleQuestion').textContent = currentQuestion.q;
    document.getElementById('battleMessage').innerHTML = `Wild ${currentEnemy.name} appeared!`;
    
    updateBattleBars();
    drawBattleEnemy(currentEnemy);
    drawBattlePet();
    renderBattleOptions();
    
    document.getElementById('battleScreen').classList.add('active');
  }
  
  function renderBattleOptions() {
    const container = document.getElementById('battleOptions');
    container.innerHTML = '';
    currentQuestion.opts.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'battle-opt-btn';
      btn.textContent = opt;
      btn.onclick = () => handleBattleAnswer(opt);
      container.appendChild(btn);
    });
  }
  
  function updateBattleBars() {
    const ep = (battleEnemyHP / currentEnemy.maxHp) * 100;
    const pp = (battlePetHP / pet.maxHp) * 100;
    document.getElementById('battleEnemyFill').style.width = `${Math.max(0, ep)}%`;
    document.getElementById('battlePetFill').style.width = `${Math.max(0, pp)}%`;
    document.getElementById('battleEnemyHp').textContent = Math.max(0, battleEnemyHP);
    document.getElementById('battlePetHp').textContent = Math.max(0, battlePetHP);
  }
  
  async function handleBattleAnswer(answer) {
    if (isAnimating || !inBattle) return;
    isAnimating = true;
    
    const enemySprite = document.getElementById('enemyBattleCanvas');
    enemySprite.classList.add('shake-effect', 'hit-effect');
    setTimeout(() => {
      enemySprite.classList.remove('shake-effect', 'hit-effect');
    }, 300);
    
    if (answer === currentQuestion.a) {
      const dmg = Math.floor(Math.random() * 13) + 11;
      battleEnemyHP -= dmg;
      document.getElementById('battleMessage').innerHTML = `Correct! Mewt dealt ${dmg} damage!`;
      updateBattleBars();
      
      if (battleEnemyHP <= 0) {
        setTimeout(() => winBattle(), 800);
        isAnimating = false;
        return;
      }
      setTimeout(() => enemyTurn(), 1000);
    } else {
      document.getElementById('battleMessage').innerHTML = `Wrong! Answer was ${currentQuestion.a}. ${currentEnemy.name} attacks!`;
      
      const dmg = Math.floor(Math.random() * currentEnemy.atk) + 5;
      const reduced = Math.max(1, dmg - Math.floor(pet.def / 3));
      battlePetHP -= reduced;
      updateBattleBars();
      
      const petSprite = document.getElementById('petBattleCanvas');
      petSprite.classList.add('shake-effect', 'hit-effect');
      setTimeout(() => {
        petSprite.classList.remove('shake-effect', 'hit-effect');
      }, 300);
      
      if (battlePetHP <= 0) {
        setTimeout(() => loseBattle(), 800);
        isAnimating = false;
        return;
      }
      
      currentQuestion = getRandomMath();
      document.getElementById('battleQuestion').textContent = currentQuestion.q;
      renderBattleOptions();
      document.getElementById('battleMessage').innerHTML = `What will Mewt do?`;
    }
    isAnimating = false;
  }
  
  function enemyTurn() {
    if (!inBattle || battleEnemyHP <= 0) return;
    
    const dmg = Math.floor(Math.random() * currentEnemy.atk) + 5;
    const reduced = Math.max(1, dmg - Math.floor(pet.def / 3));
    battlePetHP -= reduced;
    document.getElementById('battleMessage').innerHTML = `${currentEnemy.name} attacked! Dealt ${reduced} damage!`;
    updateBattleBars();
    
    const petSprite = document.getElementById('petBattleCanvas');
    petSprite.classList.add('shake-effect', 'hit-effect');
    setTimeout(() => {
      petSprite.classList.remove('shake-effect', 'hit-effect');
    }, 300);
    
    if (battlePetHP <= 0) {
      setTimeout(() => loseBattle(), 800);
      return;
    }
    
    currentQuestion = getRandomMath();
    document.getElementById('battleQuestion').textContent = currentQuestion.q;
    renderBattleOptions();
    document.getElementById('battleMessage').innerHTML = `What will Mewt do?`;
  }
  
  function winBattle() {
    const expGain = currentEnemy.exp;
    const coinGain = 25 + Math.floor(Math.random() * 25);
    
    player.xp += expGain;
    player.coins += coinGain;
    pet.hp = Math.min(pet.hp + Math.floor(pet.maxHp * 0.25), pet.maxHp);
    battlePetHP = pet.hp;
    
    document.getElementById('battleMessage').innerHTML = `Victory! +${expGain} XP, +${coinGain} coins!`;
    updateUI();
    updateBattleBars();
    
    if (player.xp >= player.xpNeeded) {
      player.lv++;
      player.xp -= player.xpNeeded;
      player.xpNeeded = Math.floor(player.xpNeeded * 1.4);
      pet.lv++;
      pet.maxHp += 10;
      pet.hp = pet.maxHp;
      pet.atk += 4;
      pet.def += 2;
      battlePetHP = pet.hp;
      document.getElementById('battleMessage').innerHTML += ` 🌟 Mewt grew to Lv${pet.lv}! 🌟`;
      updateUI();
    }
    
    // Remove defeated enemy
    const idx = enemies.findIndex(e => e.x === currentEnemy.x && e.y === currentEnemy.y);
    if (idx !== -1) enemies.splice(idx, 1);
    
    saveGame();
    
    setTimeout(() => {
      document.getElementById('battleScreen').classList.remove('active');
      inBattle = false;
      currentEnemy = null;
      isAnimating = false;
    }, 2500);
  }
  
  function loseBattle() {
    document.getElementById('battleMessage').innerHTML = `Mewt fainted... Running to heal!`;
    pet.hp = pet.maxHp;
    battlePetHP = pet.hp;
    updateUI();
    updateBattleBars();
    
    setTimeout(() => {
      document.getElementById('battleScreen').classList.remove('active');
      inBattle = false;
      currentEnemy = null;
      isAnimating = false;
    }, 2000);
  }
  
  function runBattle() {
    document.getElementById('battleMessage').innerHTML = `Got away safely!`;
    setTimeout(() => {
      document.getElementById('battleScreen').classList.remove('active');
      inBattle = false;
      currentEnemy = null;
      isAnimating = false;
    }, 800);
  }
  
  // ============================================================
  // UI UPDATES
  // ============================================================
  
  function updateUI() {
    const xpPercent = (player.xp / player.xpNeeded) * 100;
    document.getElementById('xpFillBar').style.width = `${Math.min(100, xpPercent)}%`;
    document.getElementById('xpCurrent').textContent = player.xp;
    document.getElementById('xpNeeded').textContent = player.xpNeeded;
    document.getElementById('playerLvBadge').textContent = `Lv ${player.lv}`;
    document.getElementById('coinAmount').textContent = player.coins;
    document.getElementById('battlePetLv').textContent = pet.lv;
    document.getElementById('battlePetMax').textContent = pet.maxHp;
  }
  
  // ============================================================
  // EVENT HANDLERS
  // ============================================================
  
  canvas.addEventListener('click', (e) => {
    if (inBattle) return;
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width;
    const sy = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * sx;
    const my = (e.clientY - rect.top) * sy;
    player.targetX = camX + mx;
    player.targetY = camY + my;
  });
  
  document.addEventListener('keydown', (e) => {
    if (inBattle) return;
    const k = e.key.toLowerCase();
    if (k === 'w') keys.w = true;
    if (k === 's') keys.s = true;
    if (k === 'a') keys.a = true;
    if (k === 'd') keys.d = true;
    if (['w','s','a','d'].includes(k)) {
      player.targetX = player.x;
      player.targetY = player.y;
    }
  });
  
  document.addEventListener('keyup', (e) => {
    const k = e.key.toLowerCase();
    if (k === 'w') keys.w = false;
    if (k === 's') keys.s = false;
    if (k === 'a') keys.a = false;
    if (k === 'd') keys.d = false;
  });
  
  document.getElementById('battleRunBtn').onclick = () => runBattle();
  document.getElementById('teamBtn').onclick = () => alert(`🐱 MEWT - Lv${pet.lv}\n❤️ HP: ${pet.hp}/${pet.maxHp}\n⚔️ ATK: ${pet.atk}\n🛡️ DEF: ${pet.def}`);
  document.getElementById('bagBtn').onclick = () => alert(`🎒 YOUR BAG\n🪙 ${player.coins} coins\n⭐ ${player.xp} XP`);
  document.getElementById('petInfoBtn').onclick = () => alert(`⭐ MEWT - Your companion!\nLevel: ${pet.lv}\nHP: ${pet.hp}/${pet.maxHp}\nAttack: ${pet.atk}\nDefense: ${pet.def}`);
  document.getElementById('settingsBtn').onclick = () => alert(`⚙️ CONTROLS\nWASD or Click to move\nTouch enemies to battle!\nAnswer math to attack!\n\nGame saves automatically!`);
  
  // ============================================================
  // ANIMATION LOOP
  // ============================================================
  
  function animate() {
    if (!inBattle) {
      handleMovement();
      handleClickMove();
    }
    
    // Sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, VIEW_H);
    grad.addColorStop(0, '#7dd3fc');
    grad.addColorStop(1, '#bae6fd');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    
    drawGround();
    drawFlowers();
    drawRocks();
    drawTrees();
    
    for (const e of enemies) {
      drawMapEnemy(e);
    }
    
    drawPet();
    drawPlayer();
    
    requestAnimationFrame(animate);
  }
  
  updateUI();
  animate();
</script>
</body>
</html>
