<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fanter World - Your Custom Sprites</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e1b4b);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    .game-container {
      position: relative;
      border-radius: 20px;
      border: 3px solid #fbbf24;
      background: #1a4a2a;
    }

    canvas {
      display: block;
      cursor: crosshair;
    }

    .ui-panel {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      border-radius: 30px;
      padding: 10px 20px;
      border: 2px solid #fbbf24;
      z-index: 10;
      color: white;
      font-weight: bold;
    }

    .coin-display {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      border-radius: 30px;
      padding: 10px 20px;
      border: 2px solid #fbbf24;
      color: #fbbf24;
      z-index: 10;
    }

    .controls {
      position: absolute;
      bottom: 15px;
      left: 15px;
      background: rgba(0,0,0,0.7);
      border-radius: 20px;
      padding: 8px 15px;
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      z-index: 10;
    }

    .battle-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
      border-top: 3px solid #fbbf24;
      padding: 20px;
      z-index: 100;
      display: none;
    }

    .battle-panel.active {
      display: block;
    }

    .battle-question {
      text-align: center;
      font-size: 24px;
      color: #fbbf24;
      margin-bottom: 15px;
    }

    .battle-options {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 15px;
    }

    .battle-btn {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border: none;
      border-radius: 40px;
      padding: 10px 25px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .battle-message {
      text-align: center;
      color: #fbbf24;
      margin-bottom: 10px;
    }

    .run-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      width: 100%;
      padding: 10px;
    }
  </style>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="1200" height="700"></canvas>

  <div class="ui-panel">
    ⚔️ FANTER | Lv <span id="playerLv">1</span> | ⭐ <span id="playerXp">0</span>/<span id="playerXpNeeded">100</span> XP
  </div>
  <div class="coin-display">
    🪙 <span id="playerCoins">150</span>
  </div>
  <div class="controls">
    🎮 WASD or Click to Move | 🐱 Pet Follows | ⚔️ Touch Enemy = Battle
  </div>

  <div class="battle-panel" id="battlePanel">
    <div class="battle-question" id="battleQuestion">2 + 2 = ?</div>
    <div class="battle-options" id="battleOptions"></div>
    <div class="battle-message" id="battleMessage">A wild enemy appeared!</div>
    <button class="battle-btn run-btn" id="runBattleBtn">🏃 RUN</button>
  </div>
</div>

<script>
  // ============================================================
  // FANTER WORLD - WITH YOUR CUSTOM SPRITES
  // ============================================================
  
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  
  // ============================================================
  // LOAD YOUR SPRITES
  // ============================================================
  
  // Replace these with your actual file names
  const standingSprite = new Image();   // 728x728, 6 sprites (turning/directional)
  const walkingSprite = new Image();    // 800x800, 4 sprites (walking down)
  
  // UPDATE THESE PATHS to match your actual file names!
  standingSprite.src = 'sprites/standing.png';   // change this
  walkingSprite.src = 'sprites/walking.png';     // change this
  
  // Sprite dimensions (from your sprite sheet)
  const STANDING_SHEET_SIZE = 728;
  const STANDING_FRAMES = 6;
  const STANDING_FRAME_W = STANDING_SHEET_SIZE / STANDING_FRAMES; // ~121px
  
  const WALKING_SHEET_SIZE = 800;
  const WALKING_FRAMES = 4;
  const WALKING_FRAME_W = WALKING_SHEET_SIZE / WALKING_FRAMES; // 200px
  
  // Draw size (scaled down)
  const DRAW_SIZE = 48; // 48x48 pixels on screen
  
  let imagesLoaded = false;
  let loadedCount = 0;
  
  function checkLoaded() {
    loadedCount++;
    if (loadedCount === 2) {
      imagesLoaded = true;
      console.log('✅ Both sprite sheets loaded!');
      console.log(`Standing frame width: ${STANDING_FRAME_W}px`);
      console.log(`Walking frame width: ${WALKING_FRAME_W}px`);
    }
  }
  
  standingSprite.onload = checkLoaded;
  walkingSprite.onload = checkLoaded;
  
  // ============================================================
  // WORLD SETUP
  // ============================================================
  const WORLD_W = 3200;
  const WORLD_H = 3200;
  const VIEW_W = 1200;
  const VIEW_H = 700;
  const TILE_SIZE = 32;
  
  let camX = WORLD_W/2 - VIEW_W/2;
  let camY = WORLD_H/2 - VIEW_H/2;
  
  // Simple grass map
  const tileMap = [];
  for (let i = 0; i < 100; i++) {
    tileMap[i] = [];
    for (let j = 0; j < 100; j++) {
      tileMap[i][j] = 0;
    }
  }
  
  // Trees
  const trees = [];
  for (let i = 0; i < 50; i++) {
    trees.push({
      x: 300 + Math.random() * (WORLD_W - 600),
      y: 200 + Math.random() * (WORLD_H - 400)
    });
  }
  
  // Enemies
  const enemies = [
    { x: 850, y: 650, name: 'SLIME', hp: 30, maxHp: 30, atk: 7, exp: 35, color: '#86efac' },
    { x: 1850, y: 1100, name: 'GLIMMER', hp: 38, maxHp: 38, atk: 9, exp: 50, color: '#fbbf24' },
    { x: 2600, y: 1600, name: 'SHADOWPAW', hp: 45, maxHp: 45, atk: 12, exp: 70, color: '#a855f7' },
  ];
  
  // ============================================================
  // PLAYER & PET
  // ============================================================
  let player = {
    x: WORLD_W/2,
    y: WORLD_H/2,
    targetX: WORLD_W/2,
    targetY: WORLD_H/2,
    speed: 3.2,
    walkFrame: 0,
    direction: 0, // 0=down, 1=downright, 2=right, 3=upright, 4=up, 5=upleft, 6=left, 7=downleft
    lv: 1,
    xp: 0,
    xpNeeded: 100,
    coins: 150
  };
  
  let pet = {
    x: player.x - 50,
    y: player.y,
    walkFrame: 0,
    direction: 0
  };
  
  // Battle state
  let inBattle = false;
  let currentEnemy = null;
  let battlePetHP = 0;
  let battleEnemyHP = 0;
  let currentQuestion = null;
  
  // Movement keys
  const keys = { w: false, s: false, a: false, d: false };
  
  // Math questions
  const mathBank = [
    { q: "1 + 1 = ?", a: 2, opts: [0,1,2,3] },
    { q: "2 + 2 = ?", a: 4, opts: [2,3,4,5] },
    { q: "3 + 1 = ?", a: 4, opts: [2,3,4,5] },
    { q: "5 - 2 = ?", a: 3, opts: [1,2,3,4] },
    { q: "2 + 3 = ?", a: 5, opts: [3,4,5,6] },
  ];
  
  function getRandomMath() {
    return { ...mathBank[Math.floor(Math.random() * mathBank.length)] };
  }
  
  // ============================================================
  // DRAW FUNCTIONS
  // ============================================================
  
  function drawGround() {
    const startX = Math.max(0, Math.floor(camX / TILE_SIZE));
    const endX = Math.min(99, Math.ceil((camX + VIEW_W) / TILE_SIZE) + 1);
    const startY = Math.max(0, Math.floor(camY / TILE_SIZE));
    const endY = Math.min(99, Math.ceil((camY + VIEW_H) / TILE_SIZE) + 1);
    
    for (let i = startX; i < endX; i++) {
      for (let j = startY; j < endY; j++) {
        const x = i * TILE_SIZE - camX;
        const y = j * TILE_SIZE - camY;
        ctx.fillStyle = '#4a7c3f';
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        ctx.strokeStyle = 'rgba(0,0,0,0.05)';
        ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
      }
    }
  }
  
  function drawTrees() {
    for (const tree of trees) {
      const x = tree.x - camX;
      const y = tree.y - camY;
      if (x > -50 && x < VIEW_W + 50 && y > -50 && y < VIEW_H + 50) {
        ctx.fillStyle = '#8B5A2B';
        ctx.fillRect(x-5, y+5, 10, 20);
        ctx.fillStyle = '#2d6e2d';
        ctx.beginPath();
        ctx.arc(x, y-5, 16, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#4ade80';
        ctx.beginPath();
        ctx.arc(x, y-12, 8, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }
  
  function drawMapEnemies() {
    for (const e of enemies) {
      const x = e.x - camX;
      const y = e.y - camY;
      if (x > -50 && x < VIEW_W + 50 && y > -50 && y < VIEW_H + 50) {
        const bounce = Math.sin(Date.now() / 200) * 2;
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(x, y + 8 + bounce, 14, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(x-5, y+4+bounce, 3, 4);
        ctx.fillRect(x+2, y+4+bounce, 3, 4);
        ctx.fillStyle = '#ef4444';
        ctx.font = 'bold 14px monospace';
        ctx.fillText('!', x-12, y-4+bounce);
      }
    }
  }
  
  // Draw player using YOUR walking sprite sheet
  function drawPlayer() {
    if (!imagesLoaded) return;
    
    const x = player.x - camX;
    const y = player.y - camY;
    const bob = Math.sin(Date.now() / 180) * 1.5;
    
    // Walking animation frame (0-3)
    let frame = Math.floor(player.walkFrame) % 4;
    if (player.walkFrame === 0) frame = 0; // idle = first frame
    
    const frameX = frame * WALKING_FRAME_W;
    
    ctx.drawImage(
      walkingSprite,
      frameX, 0, WALKING_FRAME_W, WALKING_FRAME_W,  // source
      x - DRAW_SIZE/2, y - DRAW_SIZE/2 + bob, DRAW_SIZE, DRAW_SIZE  // dest
    );
    
    // Update walk animation
    if (player.walkFrame > 0) {
      player.walkFrame += 0.15;
      if (player.walkFrame >= 4) player.walkFrame = 0;
    }
  }
  
  // Draw pet using YOUR standing/turning sprite sheet (6 directional frames)
  function drawPet() {
    if (!imagesLoaded) return;
    
    const x = pet.x - camX;
    const y = pet.y - camY;
    const bob = Math.sin(Date.now() / 150) * 1.5;
    
    // Use pet's direction to pick the right standing frame
    // 0=down, 2=right, 4=up, 6=left
    let frame = player.direction % 6;
    const frameX = frame * STANDING_FRAME_W;
    
    ctx.drawImage(
      standingSprite,
      frameX, 0, STANDING_FRAME_W, STANDING_FRAME_W,  // source
      x - DRAW_SIZE/2, y - DRAW_SIZE/2 + bob, DRAW_SIZE, DRAW_SIZE  // dest
    );
  }
  
  // ============================================================
  // MOVEMENT
  // ============================================================
  
  function isColliding(x, y, r) {
    for (const tree of trees) {
      if (Math.hypot(x - tree.x, y - tree.y) < r + 15) return true;
    }
    for (const e of enemies) {
      if (Math.hypot(x - e.x, y - e.y) < r + 22 && !inBattle) {
        startBattle(e);
        return true;
      }
    }
    if (x < r || x > WORLD_W - r) return true;
    if (y < r || y > WORLD_H - r) return true;
    return false;
  }
  
  function handleMovement() {
    if (inBattle) return;
    
    let mx = 0, my = 0;
    if (keys.w) my -= 1;
    if (keys.s) my += 1;
    if (keys.a) mx -= 1;
    if (keys.d) mx += 1;
    
    if (mx !== 0 || my !== 0) {
      const len = Math.hypot(mx, my);
      mx /= len;
      my /= len;
      
      let nx = player.x + mx * player.speed;
      let ny = player.y + my * player.speed;
      
      if (!isColliding(nx, player.y, 16)) player.x = nx;
      if (!isColliding(player.x, ny, 16)) player.y = ny;
      
      // Update direction (0-7 based on angle)
      const angle = Math.atan2(my, mx);
      let dir = Math.round(angle * 4 / Math.PI + 4) % 8;
      if (dir < 0) dir += 8;
      player.direction = dir;
      
      // Start walking animation
      if (player.walkFrame === 0) player.walkFrame = 0.1;
      player.walkFrame += 0.15;
      if (player.walkFrame >= 4) player.walkFrame = 0.1;
    } else {
      player.walkFrame = 0;
    }
    
    // Pet follows player
    const angle = Math.atan2(player.y - pet.y, player.x - pet.x);
    pet.x += Math.cos(angle) * 2.5;
    pet.y += Math.sin(angle) * 2.5;
    
    // Camera follows player
    camX = player.x - VIEW_W/2;
    camY = player.y - VIEW_H/2;
    camX = Math.max(0, Math.min(camX, WORLD_W - VIEW_W));
    camY = Math.max(0, Math.min(camY, WORLD_H - VIEW_H));
  }
  
  function handleClickMove() {
    if (inBattle) return;
    const dx = player.targetX - player.x;
    const dy = player.targetY - player.y;
    const dist = Math.hypot(dx, dy);
    
    if (dist > 5) {
      const mx = (dx / dist) * player.speed;
      const my = (dy / dist) * player.speed;
      let nx = player.x + mx;
      let ny = player.y + my;
      if (!isColliding(nx, player.y, 16)) player.x = nx;
      if (!isColliding(player.x, ny, 16)) player.y = ny;
      
      const angle = Math.atan2(my, mx);
      let dir = Math.round(angle * 4 / Math.PI + 4) % 8;
      if (dir < 0) dir += 8;
      player.direction = dir;
      
      if (player.walkFrame === 0) player.walkFrame = 0.1;
      player.walkFrame += 0.15;
      if (player.walkFrame >= 4) player.walkFrame = 0.1;
    } else {
      player.walkFrame = 0;
    }
  }
  
  // ============================================================
  // BATTLE SYSTEM
  // ============================================================
  
  function startBattle(enemy) {
    if (inBattle) return;
    inBattle = true;
    currentEnemy = { ...enemy };
    battleEnemyHP = currentEnemy.hp;
    battlePetHP = 42;
    currentQuestion = getRandomMath();
    
    document.getElementById('battleQuestion').textContent = currentQuestion.q;
    document.getElementById('battleMessage').innerHTML = `Wild ${currentEnemy.name} appeared!`;
    
    renderBattleOptions();
    document.getElementById('battlePanel').classList.add('active');
  }
  
  function renderBattleOptions() {
    const container = document.getElementById('battleOptions');
    container.innerHTML = '';
    currentQuestion.opts.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'battle-btn';
      btn.textContent = opt;
      btn.onclick = () => handleBattleAnswer(opt);
      container.appendChild(btn);
    });
  }
  
  function handleBattleAnswer(answer) {
    if (answer === currentQuestion.a) {
      const dmg = Math.floor(Math.random() * 12) + 10;
      battleEnemyHP -= dmg;
      document.getElementById('battleMessage').innerHTML = `Correct! ${dmg} damage!`;
      
      if (battleEnemyHP <= 0) {
        winBattle();
        return;
      }
      
      setTimeout(() => enemyTurn(), 800);
    } else {
      document.getElementById('battleMessage').innerHTML = `Wrong! Answer was ${currentQuestion.a}. Enemy attacks!`;
      const dmg = Math.floor(Math.random() * currentEnemy.atk) + 5;
      battlePetHP -= dmg;
      
      if (battlePetHP <= 0) {
        loseBattle();
        return;
      }
      
      currentQuestion = getRandomMath();
      document.getElementById('battleQuestion').textContent = currentQuestion.q;
      renderBattleOptions();
    }
  }
  
  function enemyTurn() {
    const dmg = Math.floor(Math.random() * currentEnemy.atk) + 5;
    battlePetHP -= dmg;
    document.getElementById('battleMessage').innerHTML = `${currentEnemy.name} deals ${dmg} damage!`;
    
    if (battlePetHP <= 0) {
      loseBattle();
      return;
    }
    
    currentQuestion = getRandomMath();
    document.getElementById('battleQuestion').textContent = currentQuestion.q;
    renderBattleOptions();
  }
  
  function winBattle() {
    player.xp += currentEnemy.exp;
    player.coins += 25;
    document.getElementById('battleMessage').innerHTML = `Victory! +${currentEnemy.exp} XP, +25 coins!`;
    updateUI();
    
    const idx = enemies.findIndex(e => e.x === currentEnemy.x && e.y === currentEnemy.y);
    if (idx !== -1) enemies.splice(idx, 1);
    
    setTimeout(() => {
      document.getElementById('battlePanel').classList.remove('active');
      inBattle = false;
    }, 2000);
  }
  
  function loseBattle() {
    document.getElementById('battleMessage').innerHTML = `Mewt fainted! Running away...`;
    setTimeout(() => {
      document.getElementById('battlePanel').classList.remove('active');
      inBattle = false;
    }, 1500);
  }
  
  function runBattle() {
    document.getElementById('battleMessage').innerHTML = `Got away safely!`;
    setTimeout(() => {
      document.getElementById('battlePanel').classList.remove('active');
      inBattle = false;
    }, 800);
  }
  
  // ============================================================
  // UI UPDATES
  // ============================================================
  
  function updateUI() {
    document.getElementById('playerLv').textContent = player.lv;
    document.getElementById('playerXp').textContent = player.xp;
    document.getElementById('playerXpNeeded').textContent = player.xpNeeded;
    document.getElementById('playerCoins').textContent = player.coins;
  }
  
  // ============================================================
  // EVENT HANDLERS
  // ============================================================
  
  canvas.addEventListener('click', (e) => {
    if (inBattle) return;
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width;
    const sy = canvas.height / rect.height;
    const mx = (e.clientX - rect.left) * sx;
    const my = (e.clientY - rect.top) * sy;
    player.targetX = camX + mx;
    player.targetY = camY + my;
  });
  
  document.addEventListener('keydown', (e) => {
    if (inBattle) return;
    const k = e.key.toLowerCase();
    if (k === 'w') keys.w = true;
    if (k === 's') keys.s = true;
    if (k === 'a') keys.a = true;
    if (k === 'd') keys.d = true;
    if (['w','s','a','d'].includes(k)) {
      player.targetX = player.x;
      player.targetY = player.y;
    }
  });
  
  document.addEventListener('keyup', (e) => {
    const k = e.key.toLowerCase();
    if (k === 'w') keys.w = false;
    if (k === 's') keys.s = false;
    if (k === 'a') keys.a = false;
    if (k === 'd') keys.d = false;
  });
  
  document.getElementById('runBattleBtn').onclick = () => runBattle();
  
  // ============================================================
  // ANIMATION LOOP
  // ============================================================
  
  function animate() {
    if (!inBattle) {
      handleMovement();
      handleClickMove();
    }
    
    // Sky
    ctx.fillStyle = '#7dd3fc';
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    
    drawGround();
    drawTrees();
    drawMapEnemies();
    drawPet();
    drawPlayer();
    
    requestAnimationFrame(animate);
  }
  
  updateUI();
  animate();
</script>
</body>
</html>
